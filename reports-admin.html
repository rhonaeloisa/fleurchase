<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FleurChase - Reports</title>
<link rel="stylesheet" href="shared.css"/>
<style>
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.5rem}
@media(max-width:900px){.metrics-grid{grid-template-columns:1fr 1fr}}
.metric-card{background:white;border-radius:var(--rl);border:1px solid var(--line);padding:1.3rem}
.metric-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:.5rem}
.metric-val{font-size:28px;font-weight:700;color:var(--ink);font-family:var(--font-d)}
.metric-sub{font-size:11px;margin-top:5px}
.ms-up{color:var(--g3)}.ms-dn{color:var(--p3)}.ms-n{color:var(--muted)}
.prog-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.prog-row:last-child{border-bottom:none}
.prog-bg{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .5s}
.month-select{border:1.5px solid var(--line);border-radius:var(--r);padding:8px 12px;font-family:var(--font-b);font-size:13px;outline:none;background:white;cursor:pointer}
.report-empty{color:var(--muted);font-size:13px;padding:.5rem 0}
</style>
</head>
<body>
<div id="top-nav" class="app-nav"></div>
<aside class="sidebar" id="fc-sidebar"></aside>
<div class="main-area">
<div class="p-page">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2rem;flex-wrap:wrap;gap:1rem">
    <div>
      <div class="page-title">Reports & <span style="color:var(--p3);font-style:italic">Analytics</span></div>
      <div class="page-sub" style="margin-bottom:0">Sales performance, revenue breakdown, and order insights</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select class="month-select" id="month-select" onchange="loadReports()">
        <option value="">Loading months...</option>
      </select>
      <button class="btn btn-green btn-sm" onclick="exportCSV()">Export CSV</button>
    </div>
  </div>

  <div class="metrics-grid" id="metrics-grid"></div>

  <div class="two-col" style="margin-bottom:1.5rem">
    <div class="table-wrap" style="margin-bottom:0">
      <div class="table-head"><h3>Top Selling Products</h3><span id="top-period" style="font-size:12px;color:var(--muted)"></span></div>
      <table class="data-table">
        <thead><tr><th>#</th><th>Product</th><th>Units Sold</th><th>Revenue</th><th>Trend</th></tr></thead>
        <tbody id="top-products-tbody"></tbody>
      </table>
    </div>

    <div class="table-wrap" style="margin-bottom:0">
      <div class="table-head"><h3>Revenue by Category</h3></div>
      <div style="padding:1rem" id="category-breakdown"></div>
    </div>
  </div>

  <div class="two-col" style="margin-bottom:1.5rem">
    <div class="table-wrap" style="margin-bottom:0">
      <div class="table-head"><h3>Payment Method Breakdown</h3></div>
      <div style="padding:1rem" id="payment-breakdown"></div>
    </div>

    <div class="table-wrap" style="margin-bottom:0">
      <div class="table-head"><h3>Top Delivery Areas</h3></div>
      <div style="padding:1rem" id="delivery-breakdown"></div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-head">
      <h3>Order Log</h3>
      <span id="order-log-count" style="font-size:12px;color:var(--muted)"></span>
    </div>
    <div style="overflow-x:auto">
      <table class="data-table" style="min-width:750px">
        <thead><tr><th>Order #</th><th>Customer</th><th>Items</th><th>Location</th><th>Pay Method</th><th>Status</th><th>Total</th><th>Date</th></tr></thead>
        <tbody id="order-log-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
</div>
<div id="fc-toast" class="toast"></div>
<script src="data.js"></script>
<script src="nav.js"></script>
<script>
requireAuth('admin');
buildTopNav('reports-admin');
buildAdminSidebar('reports-admin.html');

const REPORTS_API = 'db/reports_api.php';
let REPORT_DATA = null;

function pct(curr, prev) {
  if (!prev) return '0%';
  const p = Math.round(((Number(curr) - Number(prev)) / Number(prev)) * 100);
  return (p >= 0 ? '+' : '') + p + '%';
}

function money(amount) {
  if (typeof fmtP === 'function') return fmtP(Number(amount) || 0);
  return 'PHP ' + Number(amount || 0).toLocaleString('en-PH', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function statusClass(status) {
  return {
    Pending: 'tag-a',
    Processing: 'tag-b',
    'Out for Delivery': 'tag-g',
    Delivered: 'tag-w',
    Cancelled: 'tag-p'
  }[status] || 'tag-w';
}

function showLoading() {
  document.getElementById('metrics-grid').innerHTML =
    '<div class="metric-card"><div class="metric-label">Loading</div><div class="metric-sub ms-n">Retrieving report data...</div></div>';
  document.getElementById('top-products-tbody').innerHTML =
    '<tr><td colspan="5" style="text-align:center;padding:1.5rem;color:var(--muted)">Loading...</td></tr>';
  document.getElementById('category-breakdown').innerHTML = '<div class="report-empty">Loading...</div>';
  document.getElementById('payment-breakdown').innerHTML = '<div class="report-empty">Loading...</div>';
  document.getElementById('delivery-breakdown').innerHTML = '<div class="report-empty">Loading...</div>';
  document.getElementById('order-log-tbody').innerHTML =
    '<tr><td colspan="8" style="text-align:center;padding:1.5rem;color:var(--muted)">Loading...</td></tr>';
}

function progressRows(rows, labelKey, valueKey, color) {
  const total = rows.reduce((sum, row) => sum + Number(row[valueKey] || 0), 0);

  if (!rows.length || total <= 0) {
    return '<div class="report-empty">No data for this period.</div>';
  }

  return rows.map(row => {
    const value = Number(row[valueKey] || 0);
    const percent = Math.round((value / total) * 100);
    const label = row[labelKey] || 'Unspecified';
    const right = valueKey === 'revenue' ? money(value) : value + ' orders';

    return `
      <div class="prog-row">
        <span style="flex:1;font-size:12px;font-weight:500;color:var(--ink)">${label}</span>
        <div class="prog-bg" style="max-width:100px"><div class="prog-fill" style="width:${percent}%;background:${color}"></div></div>
        <span style="min-width:35px;text-align:right;font-size:12px;font-weight:600;color:${color}">${percent}%</span>
        <span style="min-width:82px;text-align:right;font-size:12px;color:var(--muted)">${right}</span>
      </div>
    `;
  }).join('');
}

function renderAll(data) {
  REPORT_DATA = data;
  const md = data.metrics.current;
  const prev = data.metrics.previous;
  const revChange = pct(md.revenue, prev.revenue);
  const ordChange = pct(md.completed_orders, prev.completed_orders);

  document.getElementById('top-period').textContent = data.period.label;

  document.getElementById('metrics-grid').innerHTML = [
    { label:'Gross Revenue', val:money(md.revenue), sub:revChange + ' vs prev month', cls:revChange.startsWith('+') ? 'ms-up' : 'ms-dn' },
    { label:'Completed Orders', val:md.completed_orders, sub:ordChange + ' vs prev month', cls:ordChange.startsWith('+') ? 'ms-up' : 'ms-dn' },
    { label:'Avg. Order Value', val:money(md.avg_order_value), sub:'per delivered order', cls:'ms-n' },
    { label:'Repeat Customers', val:md.repeat_percent + '%', sub:'of delivered customers', cls:'ms-n' },
  ].map(m => `
    <div class="metric-card">
      <div class="metric-label">${m.label}</div>
      <div class="metric-val">${m.val}</div>
      <div class="metric-sub ${m.cls}">${m.sub}</div>
    </div>
  `).join('');

  const tops = data.top_products || [];
  document.getElementById('top-products-tbody').innerHTML = tops.length ? tops.map((p, i) => `
    <tr>
      <td style="font-weight:700;color:var(--muted)">${i + 1}</td>
      <td><span style="font-size:13px;font-weight:600">${p.name}</span></td>
      <td style="font-weight:600">${p.units}</td>
      <td style="font-weight:700;color:var(--g3)">${money(p.revenue)}</td>
      <td><span class="tag tag-g" style="font-size:10px">Sold</span></td>
    </tr>
  `).join('') : '<tr><td colspan="5" style="text-align:center;padding:1.5rem;color:var(--muted)">No delivered product sales for this period.</td></tr>';

  document.getElementById('category-breakdown').innerHTML =
    progressRows(data.categories || [], 'category', 'revenue', 'var(--g4)');

  document.getElementById('payment-breakdown').innerHTML =
    progressRows(data.payments || [], 'method', 'orders', 'var(--g4)');

  document.getElementById('delivery-breakdown').innerHTML =
    progressRows(data.delivery_areas || [], 'area', 'orders', 'var(--g4)');

  const orders = data.orders || [];
  document.getElementById('order-log-count').textContent = orders.length + ' total orders';
  document.getElementById('order-log-tbody').innerHTML = orders.length ? orders.map(o => `
    <tr>
      <td style="font-weight:700;font-size:12px">ORD-${o.order_id}</td>
      <td>${o.order_name || '-'}</td>
      <td style="font-size:12px;max-width:140px">${(o.items || '-').slice(0,50)}${(o.items || '').length > 50 ? '...' : ''}</td>
      <td style="font-size:12px">${o.location || '-'}</td>
      <td style="font-size:11px">${o.payment_method || '-'}</td>
      <td><span class="tag ${statusClass(o.status)}">${o.status || '-'}</span></td>
      <td style="font-weight:700;color:var(--g3)">${money(o.total_amount)}</td>
      <td style="font-size:11px;color:var(--muted)">${o.order_date ? new Date(o.order_date).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'}) : '-'}</td>
    </tr>
  `).join('') : '<tr><td colspan="8" style="text-align:center;padding:1.5rem;color:var(--muted)">No orders for this period.</td></tr>';
}

async function loadReports() {
  const month = document.getElementById('month-select').value;
  showLoading();

  try {
    const res = await fetch(`${REPORTS_API}?month=${encodeURIComponent(month)}`, {
      headers: { Accept: 'application/json' },
      cache: 'no-cache'
    });

    if (!res.ok) throw new Error(`Server responded ${res.status}`);

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const select = document.getElementById('month-select');
    const currentValue = select.value || data.period.value;
    select.innerHTML = data.months.map(m =>
      `<option value="${m.value}" ${m.value === currentValue ? 'selected' : ''}>${m.label}</option>`
    ).join('');

    renderAll(data);
  } catch (error) {
    console.error(error);
    toast('Cannot load reports from database.', 'err');
  }
}

function exportCSV() {
  const orders = REPORT_DATA?.orders || [];
  const rows = [['Order ID','Customer','Location','Items','Pay Method','Status','Total','Date']];

  orders.forEach(o => rows.push([
    'ORD-' + o.order_id,
    o.order_name || '-',
    o.location || '-',
    (o.items || '').replace(/,/g, ';'),
    o.payment_method || '-',
    o.status || '',
    o.total_amount || 0,
    o.order_date || ''
  ]));

  const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'fleurChase_orders_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  toast('CSV exported!');
}

loadReports();
</script>
</body>
</html>
