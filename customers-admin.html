<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FleurChase — Customers</title>
<link rel="stylesheet" href="shared.css"/>
<style>
.cust-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--g5),var(--g3));color:white;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.5rem}
@media(max-width:900px){.metrics-grid{grid-template-columns:1fr 1fr}}
.metric-card{background:white;border-radius:var(--rl);border:1px solid var(--line);padding:1.3rem}
.metric-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:.4rem}
.metric-val{font-size:28px;font-weight:700;color:var(--ink);font-family:var(--font-d)}
.metric-sub{font-size:11px;color:var(--muted);margin-top:4px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.filt-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--line);background:white;font-family:var(--font-b);font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .2s}
.filt-btn:hover{border-color:var(--g5);color:var(--g2)}.filt-btn.active{background:var(--g9);border-color:var(--g5);color:var(--g2);font-weight:600}
.search-input{border:1.5px solid var(--line);border-radius:var(--r);padding:8px 12px;font-family:var(--font-b);font-size:13px;outline:none;background:var(--soft);transition:border-color .2s;width:220px}
.search-input:focus{border-color:var(--g4);background:white}
</style>
</head>
<body>
<div id="top-nav" class="app-nav"></div>
<aside class="sidebar" id="fc-sidebar"></aside>
<div class="main-area">
<div class="p-page">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2rem;flex-wrap:wrap;gap:1rem">
    <div>
      <div class="page-title">Customers</div>
      <div class="page-sub" style="margin-bottom:0">Manage and view all registered customer accounts</div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="exportCustomers()">⬇ Export CSV</button>
  </div>

  <!-- METRICS -->
  <div class="metrics-grid">
    <div class="metric-card"><div class="metric-label">Total Customers</div><div class="metric-val" id="m-total">—</div><div class="metric-sub">All registered</div></div>
    <div class="metric-card"><div class="metric-label">Active (30 days)</div><div class="metric-val" id="m-active" style="color:var(--g3)">—</div><div class="metric-sub">Placed an order</div></div>
    <div class="metric-card"><div class="metric-label">Repeat Customers</div><div class="metric-val" id="m-repeat">—</div><div class="metric-sub">2+ orders</div></div>
    <div class="metric-card"><div class="metric-label">Top Spender</div><div class="metric-val" id="m-top" style="font-size:18px;color:var(--p3)">—</div><div class="metric-sub" id="m-top-amt">—</div></div>
  </div>

  <!-- FILTER & SEARCH -->
  <div class="filter-row">
    <button class="filt-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filt-btn" onclick="setFilter('active',this)">Active</button>
    <button class="filt-btn" onclick="setFilter('repeat',this)">Repeat</button>
    <button class="filt-btn" onclick="setFilter('new',this)">New</button>
    <input class="search-input" id="cust-search" placeholder="Search by name or location..." oninput="renderTable()"/>
    <span style="font-size:12px;color:var(--muted);margin-left:auto" id="cust-count"></span>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <div class="table-head"><h3>Customer List</h3></div>
    <div style="overflow-x:auto">
      <table class="data-table" style="min-width:750px">
        <thead>
          <tr>
            <th>Customer</th>
            <th>Location</th>
            <th>Orders</th>
            <th>Total Spent</th>
            <th>Last Order</th>
            <th>Preferred Payment</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="cust-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
</div>

<!-- CUSTOMER DETAIL MODAL -->
<div class="modal-overlay" id="cust-modal">
  <div class="modal-box" style="max-width:500px">
    <div class="modal-head"><h3>Customer Details</h3><button class="modal-close" onclick="closeModal('cust-modal')">✕</button></div>
    <div id="cust-modal-body"></div>
  </div>
</div>

<div id="fc-toast" class="toast"></div>
<script src="data.js"></script>
<script src="nav.js"></script>
<script>
requireAuth('admin');
buildTopNav('customers-admin');
buildAdminSidebar('customers-admin.html');

// Build customer list from orders + seed data
const SEED_CUSTOMERS = [
  {id:'c1', name:'Ana Cruz',       email:'ana.cruz@email.com',    phone:'09171234567', loc:'Legazpi City', joined:'Jan 2024'},
  {id:'c2', name:'Rico Santos',    email:'rico.santos@email.com', phone:'09181234567', loc:'Daraga',       joined:'Feb 2024'},
  {id:'c3', name:'Joy Reyes',      email:'joy.reyes@email.com',   phone:'09191234567', loc:'Legazpi City', joined:'Mar 2024'},
  {id:'c4', name:'Mark Tan',       email:'mark.tan@email.com',    phone:'09201234567', loc:'Camalig',      joined:'Jan 2024'},
  {id:'c5', name:'Luz Villanueva', email:'luz.v@email.com',       phone:'09211234567', loc:'Oas',          joined:'Feb 2024'},
  {id:'c6', name:'Bea Mercado',    email:'bea.m@email.com',       phone:'09221234567', loc:'Daraga',       joined:'Mar 2024'},
  {id:'c7', name:'Leo Flores',     email:'leo.f@email.com',       phone:'09231234567', loc:'Tabaco City',  joined:'Jan 2024'},
  {id:'c8', name:'Mia Reyes',      email:'mia.r@email.com',       phone:'09241234567', loc:'Legazpi City', joined:'Feb 2024'},
];

let activeFilter = 'all';

function buildCustomerData() {
  const orders = FC.getOrders();
  return SEED_CUSTOMERS.map(c => {
    const custOrders = orders.filter(o => (o.customer||o.cust||'').toLowerCase().includes(c.name.split(' ')[0].toLowerCase()));
    const spent = custOrders.reduce((s,o)=>s+(o.total||0),0);
    const lastOrder = custOrders[0];
    const payMethods = custOrders.map(o=>o.payMethod||'').filter(Boolean);
    const preferred = payMethods.length ? payMethods.sort((a,b)=>payMethods.filter(v=>v===b).length-payMethods.filter(v=>v===a).length)[0] : '—';
    return { ...c, orderCount: custOrders.length, spent, lastOrder, preferred };
  });
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderTable() {
  let data = buildCustomerData();
  const q = document.getElementById('cust-search').value.toLowerCase();
  if (q) data = data.filter(c => c.name.toLowerCase().includes(q) || c.loc.toLowerCase().includes(q));
  if (activeFilter === 'active') data = data.filter(c => c.orderCount > 0);
  if (activeFilter === 'repeat') data = data.filter(c => c.orderCount >= 2);
  if (activeFilter === 'new')    data = data.filter(c => c.orderCount === 0);

  document.getElementById('cust-count').textContent = data.length + ' customer' + (data.length!==1?'s':'');

  const sc = {Pending:'tag-a',Processing:'tag-b','Out for Delivery':'tag-g',Delivered:'tag-w'};
  document.getElementById('cust-tbody').innerHTML = data.length ? data.map(c => {
    const tier = c.spent > 5000 ? '<span class="tag tag-gold">⭐ Gold</span>' : c.spent > 2000 ? '<span class="tag tag-b">Silver</span>' : '<span class="tag tag-w">Regular</span>';
    const statusTag = c.orderCount > 0 ? '<span class="tag tag-g">Active</span>' : '<span class="tag tag-w">New</span>';
    return `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="cust-av">${c.name[0]}</div>
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--ink)">${c.name}</div>
            <div style="font-size:11px;color:var(--muted)">${c.email}</div>
          </div>
        </div>
      </td>
      <td style="font-size:12px">📍 ${c.loc}</td>
      <td><span style="font-size:15px;font-weight:700;color:var(--ink)">${c.orderCount}</span>${c.orderCount>=2?' '+tier:''}</td>
      <td style="font-weight:700;color:var(--g3)">${c.spent ? fmtP(c.spent) : '—'}</td>
      <td style="font-size:12px">${c.lastOrder ? (c.lastOrder.delivDate||'Recent') + '<br><span class="tag ' + (sc[c.lastOrder.status]||'tag-w') + '" style="font-size:9px">' + c.lastOrder.status + '</span>' : '—'}</td>
      <td style="font-size:11px;color:var(--muted)">${c.preferred}</td>
      <td>${statusTag}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="viewCustomer('${c.id}')">View</button></td>
    </tr>`;
  }).join('') : `<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--muted)">No customers found</td></tr>`;
}

function renderMetrics() {
  const data = buildCustomerData();
  const active  = data.filter(c => c.orderCount > 0).length;
  const repeat  = data.filter(c => c.orderCount >= 2).length;
  const topCust = data.sort((a,b) => b.spent-a.spent)[0];
  document.getElementById('m-total').textContent  = data.length;
  document.getElementById('m-active').textContent = active;
  document.getElementById('m-repeat').textContent = repeat;
  document.getElementById('m-top').textContent    = topCust?.name.split(' ')[0] || '—';
  document.getElementById('m-top-amt').textContent = topCust?.spent ? fmtP(topCust.spent) + ' spent' : '—';
}

function viewCustomer(id) {
  const c = buildCustomerData().find(x => x.id === id);
  if (!c) return;
  const orders = FC.getOrders().filter(o => (o.customer||o.cust||'').toLowerCase().includes(c.name.split(' ')[0].toLowerCase()));
  const sc = {Pending:'tag-a',Processing:'tag-b','Out for Delivery':'tag-g',Delivered:'tag-w'};
  document.getElementById('cust-modal-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--line)">
      <div class="cust-av" style="width:50px;height:50px;font-size:20px">${c.name[0]}</div>
      <div>
        <div style="font-size:18px;font-weight:700;color:var(--g1);font-family:var(--font-d)">${c.name}</div>
        <div style="font-size:12px;color:var(--muted)">${c.email} · ${c.phone}</div>
        <div style="font-size:12px;color:var(--muted)">📍 ${c.loc} · Member since ${c.joined}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.2rem">
      <div style="background:var(--soft);border-radius:var(--r);padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:700;color:var(--g2);font-family:var(--font-d)">${c.orderCount}</div>
        <div style="font-size:10px;color:var(--muted)">Total Orders</div>
      </div>
      <div style="background:var(--soft);border-radius:var(--r);padding:10px;text-align:center">
        <div style="font-size:16px;font-weight:700;color:var(--g3)">${c.spent ? fmtP(c.spent) : '₱0'}</div>
        <div style="font-size:10px;color:var(--muted)">Total Spent</div>
      </div>
      <div style="background:var(--soft);border-radius:var(--r);padding:10px;text-align:center">
        <div style="font-size:13px;font-weight:600;color:var(--ink)">${c.preferred.split(' ')[0] || '—'}</div>
        <div style="font-size:10px;color:var(--muted)">Pref. Payment</div>
      </div>
    </div>
    <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:.7rem">Order History</div>
    ${orders.length ? orders.map(o=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:12px">
        <div>
          <div style="font-weight:600;color:var(--ink)">${o.id}</div>
          <div style="color:var(--muted)">${(o.items||'').slice(0,40)}${(o.items||'').length>40?'...':''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:700;color:var(--g3)">${fmtP(o.total)}</div>
          <span class="tag ${sc[o.status]||'tag-w'}" style="font-size:9px">${o.status}</span>
        </div>
      </div>`).join('') : '<p style="color:var(--muted);font-size:13px">No orders found.</p>'}
    <div style="margin-top:1rem;display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="closeModal('cust-modal')">Close</button>
      <button class="btn btn-green btn-sm" onclick="toast('Message sent to ${c.name}! 📧')">📧 Message</button>
    </div>`;
  openModal('cust-modal');
}

function exportCustomers() {
  const data = buildCustomerData();
  const rows = [['ID','Name','Email','Phone','Location','Orders','Total Spent','Status']];
  data.forEach(c => rows.push([c.id, c.name, c.email, c.phone, c.loc, c.orderCount, c.spent, c.orderCount>0?'Active':'New']));
  const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'fleurChase_customers_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  toast('Customer list exported! 📊');
}

renderMetrics();
renderTable();
</script>
</body>
</html>
