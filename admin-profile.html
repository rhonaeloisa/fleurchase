<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FleurChase — My Profile</title>
<link rel="stylesheet" href="shared.css"/>
<style>

#footer-container {
  width: 100vw;
  margin-left: calc(50% - 50vw);
  margin-right: calc(50% - 50vw);
}

#footer-container {
  margin-bottom: -30px;
}

.site-footer {
  margin-bottom: 0px;
}
.prof-hero{background:linear-gradient(135deg,var(--g9) 0%,white 50%,var(--p9) 100%);border-radius:var(--rl);border:1px solid var(--line);padding:2rem;display:flex;gap:1.5rem;align-items:center;margin-bottom:1.5rem;position:relative;overflow:hidden}
.prof-hero::after{content:'🌸';position:absolute;font-size:110px;opacity:.05;right:1rem;bottom:-.5rem;pointer-events:none}
.prof-av-wrap{position:relative;flex-shrink:0}
.prof-av{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,var(--g4),var(--g2));border:3px solid var(--g6);display:flex;align-items:center;justify-content:center;font-size:30px;color:white;font-weight:700;font-family:var(--font-d)}
.cam-btn{position:absolute;bottom:0;right:0;width:24px;height:24px;background:var(--p3);border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;color:white}
.prof-name{font-family:var(--font-d);font-size:26px;font-weight:700;color:var(--g1)}
.prof-email{font-size:13px;color:var(--muted);margin:.2rem 0 .5rem}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat-box{background:white;border-radius:var(--r);border:1px solid var(--line);padding:12px;text-align:center}
.stat-val{font-family:var(--font-d);font-size:22px;font-weight:700;color:var(--g1)}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.profile-grid{display:grid;grid-template-columns:1fr;gap:1.2rem;margin-bottom:1.2rem;}
.prof-left-col{
  width:100%;
}

.prof-card{
  width:100%;
  box-sizing:border-box;
}
.prof-av{
  overflow:hidden;
  color:transparent;
}
.prof-card{background:white;border-radius:var(--rl);border:1px solid var(--line);padding:1.4rem}
.prof-card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:1.1rem;display:flex;align-items:center;gap:8px}
.prof-card h3::after{content:'';flex:1;height:1px;background:var(--line)}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-row span:first-child{color:var(--muted)}
.info-row span:last-child{font-weight:500;color:var(--ink);text-align:right}
.addr-item{background:var(--soft);border-radius:var(--r);padding:11px 13px;border:1.5px solid transparent;margin-bottom:8px;cursor:pointer;transition:all .2s}
.addr-item:hover{border-color:var(--g5)}
.addr-item.default{border-color:var(--g4);background:var(--g9)}
.addr-item-title{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:2px;display:flex;align-items:center;gap:6px}
.addr-item-detail{font-size:12px;color:var(--muted);line-height:1.5}
.order-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.order-row:last-child{border-bottom:none}
.or-icon{width:40px;height:40px;background:var(--soft);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

.prof-left-col {
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}
</style>
</head>
<body>
<div id="top-nav" class="app-nav"></div>

<aside class="sidebar" id="fc-sidebar"></aside>
<div class="main-area">
<div class="p-page">
  <div class="page-title">My <span style="color:var(--p3);font-style:italic">Profile</span></div>
  <div class="page-sub">Manage your account information and delivery addresses</div>

  <div class="prof-hero">
  <div class="prof-av-wrap">
    <div class="prof-av" id="prof-av-initial">M</div>

    <label class="cam-btn" for="profile-photo-input" title="Upload profile photo">
      📷
    </label>

    <input
      type="file"
      id="profile-photo-input"
      accept="image/*"
      style="display:none"
      onchange="uploadProfilePhoto(event)"
    />
  </div>
    <div style="flex:1">
      <div class="prof-name" id="prof-disp-name">Loading...</div>
      <div class="prof-email" id="prof-disp-email">—</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <span class="tag tag-gold">✓ Verified</span>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" id="edit-btn" onclick="toggleEdit()">✎ Edit</button>
  </div>


  <div class="profile-grid">
    <!-- LEFT SIDE COLUMN (Personal Info + Recent Orders) -->
    <div class="prof-left-col">
      <!-- PERSONAL INFO -->
      <div class="prof-card">
        <h3>Personal Information</h3>
        <!-- VIEW -->
        <div id="view-info">
          <div class="info-row"><span>Full Name</span><span id="v-name">—</span></div>
          <div class="info-row"><span>Email</span><span id="v-email">—</span></div>
          <div class="info-row"><span>Phone</span><span id="v-phone">—</span></div>
          <div class="info-row"><span>Member Since</span><span id="v-joined">Loading...</span></div>
        </div>
        <!-- EDIT (hidden by default) -->
        <div id="edit-info" style="display:none">
          <div class="fg2">
            <div class="ff"><label>First name</label><input id="ef-fn" placeholder="Maria"/></div>
            <div class="ff"><label>Last name</label><input id="ef-ln" placeholder="Santos"/></div>
          </div>
          <div class="ff"><label>Email address</label><input id="ef-email" type="email"/></div>
          <div class="ff"><label>Phone number</label><input id="ef-phone" placeholder="09XX XXX XXXX" maxlength="11"/></div>
          <div class="ff"><label>New password <small style="font-weight:400;color:var(--muted)">(leave blank to keep)</small></label><input id="ef-pw" type="password" placeholder="••••••••"/></div>
          <div style="display:flex;gap:8px;margin-top:.5rem">
            <button class="btn btn-green" style="flex:1;justify-content:center" onclick="saveProfile()">✓ Save</button>
            <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="toggleEdit()">Cancel</button>
          </div>
        </div>
      </div>     
    </div>

    
</div>

<div id="fc-toast" class="toast"></div>

<script src="data.js"></script>
<script src="nav.js"></script>
<script>

let user = requireAuth('admin');
buildTopNav('admin-profile.html');
buildAdminSidebar('admin-profile.html');

let editMode = false;

async function loadProfileFromDB() {
  const currentUser = FC.getUser();
  if (!currentUser || !currentUser.email) return;

  try {
    const res = await fetch('get_profile_info.php?email=' + encodeURIComponent(currentUser.email));
    const data = await res.json();

    if (!data.success) {
      toast(data.message || 'Unable to load profile.', 'err');
      return;
    }

    const dbUser = data.user;
    const fullName = `${dbUser.first_name || ''} ${dbUser.last_name || ''}`.trim();

    user = {
      ...currentUser,
      email: dbUser.user_email,
      role: String(dbUser.user_role || '').trim().toLowerCase(),
      name: fullName || 'Administrator',
      phone: dbUser.contact || '',
      joined: dbUser.created_at || ''
    };

    FC.setUser(user);
    init();
  } catch (error) {
    console.error(error);
    toast('Cannot fetch profile info.', 'err');
  }
}

function init() {
  if (!user) return;

  const parts = (user.name || '').split(' ');

  document.getElementById('prof-av-initial').textContent = (user.name || 'A')[0].toUpperCase();
  document.getElementById('prof-disp-name').textContent = user.name || 'Administrator';
  document.getElementById('prof-disp-email').textContent = user.email || '—';

  document.getElementById('v-name').textContent = user.name || '—';
  document.getElementById('v-email').textContent = user.email || '—';
  document.getElementById('v-phone').textContent = user.phone || '—';

  if (user.joined) {
    document.getElementById('v-joined').textContent =
      new Date(user.joined).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long'
      });
  } else {
    document.getElementById('v-joined').textContent = '—';
  }

  document.getElementById('ef-fn').value = parts[0] || '';
  document.getElementById('ef-ln').value = parts.slice(1).join(' ') || '';
  document.getElementById('ef-email').value = user.email || '';
  document.getElementById('ef-phone').value = user.phone || '';
}

function toggleEdit() {
  editMode = !editMode;
  document.getElementById('view-info').style.display = editMode ? 'none' : 'block';
  document.getElementById('edit-info').style.display = editMode ? 'block' : 'none';
  document.getElementById('edit-btn').textContent = editMode ? '← Cancel' : '✎ Edit';
}

async function saveProfile() {
  const fn = document.getElementById('ef-fn').value.trim();
  const ln = document.getElementById('ef-ln').value.trim();
  const email = document.getElementById('ef-email').value.trim();
  const phone = document.getElementById('ef-phone').value.trim();

  if (!fn || !email) {
    toast('Name and email are required.', 'err');
    return;
  }

  if (phone && !/^09\d{9}$/.test(phone)) {
    toast('Please enter a valid PH mobile number.', 'err');
    return;
  }

  const formData = new FormData();
  formData.append('old_email', user.email);
  formData.append('first_name', fn);
  formData.append('last_name', ln);
  formData.append('email', email);
  formData.append('contact', phone);

  try {
    const res = await fetch('update_profile.php', {
      method: 'POST',
      body: formData
    });

    const data = await res.json();

    if (!data.success) {
      toast(data.message || 'Profile update failed.', 'err');
      return;
    }

    user = {
      ...user,
      name: data.user.name,
      email: data.user.email,
      phone: data.user.phone
    };

    FC.setUser(user);
    toggleEdit();
    toast('Admin profile saved!');
    init();
  } catch (error) {
    console.error(error);
    toast('Cannot update profile.', 'err');
  }
}

function uploadProfilePhoto(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    const imageUrl = e.target.result;
    const avatar = document.getElementById('prof-av-initial');
    
    avatar.textContent = '';
    avatar.innerHTML = '';
    avatar.style.backgroundImage = `url('${imageUrl}')`;
    avatar.style.backgroundSize = 'cover';
    avatar.style.backgroundPosition = 'center';

    localStorage.setItem('fc_admin_profile_photo', imageUrl);
    toast('Profile photo updated!');
  };

  reader.readAsDataURL(file);
}

function loadProfilePhoto() {
  const savedPhoto = localStorage.getItem('fc_admin_profile_photo');
  if (!savedPhoto) return;

  const avatar = document.getElementById('prof-av-initial');
  avatar.textContent = '';
  avatar.innerHTML = '';
  avatar.style.backgroundImage = `url('${savedPhoto}')`;
  avatar.style.backgroundSize = 'cover';
  avatar.style.backgroundPosition = 'center';
}

loadProfilePhoto();
loadProfileFromDB();
</script>
</body>
</html>
