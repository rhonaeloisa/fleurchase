<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FleurChase — My Profile</title>
<link rel="stylesheet" href="shared.css"/>
<style>

#footer-container {
  width: 100vw;
  margin-left: calc(50% - 50vw);
  margin-right: calc(50% - 50vw);
}

#footer-container {
  margin-bottom: -30px;
}

.site-footer {
  margin-bottom: 0px;
}
.prof-hero{background:linear-gradient(135deg,var(--g9) 0%,white 50%,var(--p9) 100%);border-radius:var(--rl);border:1px solid var(--line);padding:2rem;display:flex;gap:1.5rem;align-items:center;margin-bottom:1.5rem;position:relative;overflow:hidden}
.prof-hero::after{content:'🌸';position:absolute;font-size:110px;opacity:.05;right:1rem;bottom:-.5rem;pointer-events:none}
.prof-av-wrap{position:relative;flex-shrink:0}
.prof-av{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,var(--g4),var(--g2));border:3px solid var(--g6);display:flex;align-items:center;justify-content:center;font-size:30px;color:white;font-weight:700;font-family:var(--font-d)}
.cam-btn{position:absolute;bottom:0;right:0;width:24px;height:24px;background:var(--p3);border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;color:white}
.prof-name{font-family:var(--font-d);font-size:26px;font-weight:700;color:var(--g1)}
.prof-email{font-size:13px;color:var(--muted);margin:.2rem 0 .5rem}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat-box{background:white;border-radius:var(--r);border:1px solid var(--line);padding:12px;text-align:center}
.stat-val{font-family:var(--font-d);font-size:22px;font-weight:700;color:var(--g1)}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.2rem}
.prof-card{background:white;border-radius:var(--rl);border:1px solid var(--line);padding:1.4rem}
.prof-card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:1.1rem;display:flex;align-items:center;gap:8px}
.prof-card h3::after{content:'';flex:1;height:1px;background:var(--line)}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-row span:first-child{color:var(--muted)}
.info-row span:last-child{font-weight:500;color:var(--ink);text-align:right}
.addr-item{background:var(--soft);border-radius:var(--r);padding:11px 13px;border:1.5px solid transparent;margin-bottom:8px;cursor:pointer;transition:all .2s}
.addr-item:hover{border-color:var(--g5)}
.addr-item.default{border-color:var(--g4);background:var(--g9)}
.addr-item-title{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:2px;display:flex;align-items:center;gap:6px}
.addr-item-detail{font-size:12px;color:var(--muted);line-height:1.5}
.order-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.order-row:last-child{border-bottom:none}
.or-icon{width:40px;height:40px;background:var(--soft);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

.prof-left-col {
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}
</style>
</head>
<body>
<div id="top-nav" class="app-nav"></div>

<aside class="sidebar" id="fc-sidebar"></aside>
<div class="main-area">
<div class="p-page">
  <div class="page-title">My <span style="color:var(--p3);font-style:italic">Profile</span></div>
  <div class="page-sub">Manage your account information and delivery addresses</div>

  <div class="prof-hero">
  <div class="prof-av-wrap">
    <div class="prof-av" id="prof-av-initial">M</div>

    <label class="cam-btn" for="profile-photo-input" title="Upload profile photo">
      📷
    </label>

    <input
      type="file"
      id="profile-photo-input"
      accept="image/*"
      style="display:none"
      onchange="uploadProfilePhoto(event)"
    />
  </div>
    <div style="flex:1">
      <div class="prof-name" id="prof-disp-name">Loading...</div>
      <div class="prof-email" id="prof-disp-email">—</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <span class="tag tag-gold">✓ Verified</span>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" id="edit-btn" onclick="toggleEdit()">✎ Edit</button>
  </div>


  <div class="profile-grid">
    <!-- LEFT SIDE COLUMN (Personal Info + Recent Orders) -->
    <div class="prof-left-col">
      <!-- PERSONAL INFO -->
      <div class="prof-card">
        <h3>Personal Information</h3>
        <!-- VIEW -->
        <div id="view-info">
          <div class="info-row"><span>Full Name</span><span id="v-name">—</span></div>
          <div class="info-row"><span>Email</span><span id="v-email">—</span></div>
          <div class="info-row"><span>Phone</span><span id="v-phone">—</span></div>
          <div class="info-row"><span>Member Since</span><span id="v-joined">Loading...</span></div>
        </div>
        <!-- EDIT (hidden by default) -->
        <div id="edit-info" style="display:none">
          <div class="fg2">
            <div class="ff"><label>First name</label><input id="ef-fn" placeholder="Maria"/></div>
            <div class="ff"><label>Last name</label><input id="ef-ln" placeholder="Santos"/></div>
          </div>
          <div class="ff"><label>Email address</label><input id="ef-email" type="email"/></div>
          <div class="ff"><label>Phone number</label><input id="ef-phone" placeholder="09XX XXX XXXX" maxlength="11"/></div>
          <div class="ff"><label>New password <small style="font-weight:400;color:var(--muted)">(leave blank to keep)</small></label><input id="ef-pw" type="password" placeholder="••••••••"/></div>
          <div style="display:flex;gap:8px;margin-top:.5rem">
            <button class="btn btn-green" style="flex:1;justify-content:center" onclick="saveProfile()">✓ Save</button>
            <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="toggleEdit()">Cancel</button>
          </div>
        </div>
      </div>     
    </div>

    
</div>

<div id="fc-toast" class="toast"></div>

<script src="data.js"></script>
<script src="nav.js"></script>
<script>

let user = requireAuth('admin');
buildTopNav('admin-profile.html');
buildAdminSidebar('admin-profile.html');

let editMode = false;

async function loadProfileFromDB() {
  const currentUser = FC.getUser();
  if (!currentUser || !currentUser.email) return;

  try {
    const res = await fetch('get_profile_info.php?email=' + encodeURIComponent(currentUser.email));
    const data = await res.json();

    if (!data.success) {
      toast(data.message || 'Unable to load profile.', 'err');
      return;
    }

    const dbUser = data.user;
    const fullName = `${dbUser.first_name || ''} ${dbUser.last_name || ''}`.trim();

    user = {
      ...currentUser,
      email: dbUser.user_email,
      role: String(dbUser.user_role || '').trim().toLowerCase(),
      name: fullName || 'Customer',
      phone: dbUser.contact || '',
      joined: dbUser.created_at || '', 
      addresses: data.addresses || (data.address ? [data.address] : []),
      orders: data.orders || []
    };

    FC.setUser(user);
    init();
  } catch (error) {
    console.error(error);
    toast('Cannot fetch profile info.', 'err');
  }
}

function toggleAddressForm() {
  const form = document.getElementById('addr-form');
  const btn = document.getElementById('addr-toggle-btn');

  const isOpen = form.style.display === 'block';
  form.style.display = isOpen ? 'none' : 'block';
  if(btn) btn.textContent = isOpen ? '+ Add / Edit Address' : 'Cancel';

  if (!isOpen && user.address) {
    document.getElementById('addr-house').value = user.address.house_no || '';
    document.getElementById('addr-street').value = user.address.street || '';
    document.getElementById('addr-barangay').value = user.address.barangay || '';
    document.getElementById('addr-city').value = user.address.city || '';
    document.getElementById('addr-province').value = user.address.province || '';
    document.getElementById('addr-zip').value = user.address.zip || '';
  }
}

function hideAddressForm() {
  document.getElementById('addr-form').style.display = 'none';
}

function init() {
  if (!user) return;
  const parts = (user.name || '').split(' ');
  document.getElementById('prof-av-initial').textContent = (user.name||'U')[0].toUpperCase();
  document.getElementById('prof-disp-name').textContent  = user.name || '—';
  document.getElementById('prof-disp-email').textContent = user.email || '—';
  document.getElementById('v-name').textContent  = user.name || '—';
  document.getElementById('v-email').textContent = user.email || '—';
  document.getElementById('v-phone').textContent = user.phone || '—';

  if (user.joined) {
    const formatConfig = { year: 'numeric', month: 'long' };
    document.getElementById('v-joined').textContent = new Date(user.joined).toLocaleDateString('en-US', formatConfig);
  } else {
    document.getElementById('v-joined').textContent = '—';
  }

  document.getElementById('ef-fn').value    = parts[0] || '';
  document.getElementById('ef-ln').value    = parts.slice(1).join(' ') || '';
  document.getElementById('ef-email').value = user.email || '';
  document.getElementById('ef-phone').value = user.phone || '';

  const orders = user.orders || [];
  const spent   = orders.reduce((s,o) => s + (o.total||0), 0);
  const count   = orders.length;
  document.getElementById('stat-total-orders').textContent = count;
  document.getElementById('stat-total-spent').textContent  = spent >= 1000 ? '₱' + (spent/1000).toFixed(1) + 'k' : '₱' + spent;

  const freq = {};
  orders.forEach(o => { if(o.items) { freq[o.items] = (freq[o.items]||0) + 1; } });
  const fav = Object.entries(freq).sort((a,b)=>b[1]-a[1])[0];
  
  // IPAPAKITA ANG BUONG PANGALAN NG FAV ITEM NANG HINDI PINUPUTOL
  if (fav) {
    document.getElementById('stat-fav-item').textContent = fav[0];
  } else {
    document.getElementById('stat-fav-item').textContent = '—';
  }

  const sc = {Pending:'tag-a',Processing:'tag-b','Out for Delivery':'tag-g',Delivered:'tag-w'};
  const recentEl = document.getElementById('recent-orders');
  if (!orders.length) {
    recentEl.innerHTML = `<div class="empty-state" style="padding:1.5rem 0"><div class="ei">📭</div><h3>No orders yet</h3><p>Head to the shop to place your first pre-order!</p><a class="btn btn-green btn-sm" href="shop.html" style="text-decoration:none;margin-top:.8rem;display:inline-flex">Shop Now →</a></div>`;
  } else {
    recentEl.innerHTML = orders.slice(0,4).map(o => {
      const imageFolder = 'images/'; 
      
      // Dynamic rendering ng maliit na image thumbnail sa tabi ng text block (size 32px)
      const finalMediaThumbnail = o.image 
        ? `<img src="${imageFolder}${o.image}" style="width:32px; height:32px; object-fit:cover; border-radius:var(--r); flex-shrink:0;" alt="">` 
        : '<div style="width:32px; height:32px; background:var(--soft); border-radius:var(--r); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0;">💐</div>';

      // Naka-right side ang presyo, kulay green text gamit ang var(--g1) o native green color rule, at saktong font compression (.85rem)
      return `
        <div class="order-row" style="display:flex; align-items:center; gap:10px; font-size:0.85rem; width:100%;">
          ${finalMediaThumbnail}
          <div class="or-info" style="flex:1;">
            <div class="or-name" style="font-weight:600; color:var(--g1); font-size:0.85rem;">${(o.items||'Order').slice(0,48)}${(o.items||'').length>48?'...':''}</div>
            <div class="or-meta" style="font-size:0.75rem; color:var(--muted); margin-top:2px;">${o.delivDate||'—'} · <span class="tag ${sc[o.status]||'tag-w'}" style="font-size:9px;padding:1px 6px">${o.status}</span></div>
          </div>
          <div class="or-total" style="font-weight:700; color:green; font-family:var(--font-d); margin-left:auto; font-size:0.85rem;">₱${o.total.toLocaleString()}</div>
        </div>`;
    }).join('');
  }

  renderAddresses();
}

function toggleEdit() {
  editMode = !editMode;
  document.getElementById('view-info').style.display = editMode ? 'none' : 'block';
  document.getElementById('edit-info').style.display = editMode ? 'block' : 'none';
  document.getElementById('edit-btn').textContent = editMode ? '← Cancel' : '✎ Edit';
}

async function saveProfile() {
  const fn    = document.getElementById('ef-fn').value.trim();
  const ln    = document.getElementById('ef-ln').value.trim();
  const email = document.getElementById('ef-email').value.trim();
  const phone = document.getElementById('ef-phone').value.trim();

    if (!fn || !email) {
    toast('Name and email are required.', 'err');
    return;
  }

  if (phone && !/^09\d{9}$/.test(phone)) {
    toast('Please enter a valid PH mobile number (09XXXXXXXXX).', 'err');
    return;
  }

  const formData = new FormData();
  formData.append('old_email', user.email);
  formData.append('first_name', fn);
  formData.append('last_name', ln);
  formData.append('email', email);
  formData.append('contact', phone);

  try {
    const res = await fetch('update_profile.php', {
      method: 'POST',
      body: formData
    });

    const data = await res.json();

    if (!data.success) {
      toast(data.message || 'Profile update failed.', 'err');
      return;
    }

    const updated = {
      ...user,
      name: data.user.name,
      email: data.user.email,
      phone: data.user.phone
    };

    user = updated;
    FC.setUser(updated);

    toggleEdit();
    toast('Profile saved!');
    init();
  } catch (error) {
    console.error(error);
    toast('Cannot update profile.', 'err');
  }
}

function uploadProfilePhoto(event) {
  const file = event.target.files[0];
  if (!file) return;

  if (!file.type.startsWith('image/')) {
    toast('Please upload an image file.', 'err');
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const imageUrl = e.target.result;
    const avatar = document.getElementById('prof-av-initial');

    avatar.textContent = '';
    avatar.style.backgroundImage = `url('${imageUrl}')`;
    avatar.style.backgroundSize = 'cover';
    avatar.style.backgroundPosition = 'center';

    localStorage.setItem('fc_profile_photo', imageUrl);
    toast('Profile photo updated!', 'success');
  };

  reader.readAsDataURL(file);
}

function loadProfilePhoto() {
  const savedPhoto = localStorage.getItem('fc_profile_photo');
  if (!savedPhoto) return;

  const avatar = document.getElementById('prof-av-initial');
  avatar.textContent = '';
  avatar.style.backgroundImage = `url('${savedPhoto}')`;
  avatar.style.backgroundSize = 'cover';
  avatar.style.backgroundPosition = 'center';
}

loadProfilePhoto();

async function saveAddress() {
  const formData = new FormData();
  formData.append('email', user.email);
  formData.append('address_id', document.getElementById('addr-id').value);
  formData.append('house_no', document.getElementById('addr-house').value.trim());
  formData.append('street', document.getElementById('addr-street').value.trim());
  formData.append('barangay', document.getElementById('addr-barangay').value.trim());
  formData.append('city', document.getElementById('addr-city').value.trim());
  
  formData.append('province', 'Albay');
  formData.append('zip', document.getElementById('addr-zip').value.trim());

  const res = await fetch('save_address.php', {
    method: 'POST',
    body: formData
  });

  const data = await res.json();

  if (!data.success) {
    toast(data.message || 'Address save failed.', 'err');
    return;
  }

  toast(data.message || 'Address saved!');
  document.getElementById('addr-form').style.display = 'none';
  loadProfileFromDB();
}

function renderAddresses() {
  const list = document.getElementById('address-list');
  if (!list) return;

  const addresses = user.addresses || [];

  if (!addresses.length) {
    list.innerHTML = `<div class="addr-item"><div class="addr-item-detail">No address saved yet.</div></div>`;
    return;
  }

  list.innerHTML = addresses.map(a => {
    const fullAddress = [a.house_no, a.street, a.barangay, a.city, a.province, a.zip]
      .filter(Boolean)
      .join(', ');

    return `
      <div class="addr-item ${Number(a.is_default) === 1 ? 'default' : ''}">
        <div class="addr-item-title" style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <span>Home ${Number(a.is_default) === 1 ? '<span class="tag tag-g" style="font-size:9px;padding:1px 6px">Default</span>' : ''}</span>
          <button class="btn btn-ghost btn-sm" onclick="editAddress('${a.address_id}')">Edit</button>
        </div>
        <div class="addr-item-detail">${fullAddress}</div>
      </div>`;
  }).join('');
}


function showAddAddressForm() {
  document.getElementById('addr-form').style.display = 'block';
  document.getElementById('addr-id').value = '';
  document.getElementById('addr-house').value = '';
  document.getElementById('addr-street').value = '';
  document.getElementById('addr-barangay').value = '';
  document.getElementById('addr-city').value = '';
  document.getElementById('addr-province').value = 'Albay';
  document.getElementById('addr-zip').value = '';
}

function editAddress(addressId) {
  const address = (user.addresses || []).find(a => String(a.address_id) === String(addressId));
  if (!address) return;

  document.getElementById('addr-form').style.display = 'block';
  document.getElementById('addr-id').value = address.address_id;
  document.getElementById('addr-house').value = address.house_no || '';
  document.getElementById('addr-street').value = address.street || '';
  document.getElementById('addr-barangay').value = address.barangay || '';
  document.getElementById('addr-city').value = address.city || '';
  document.getElementById('addr-province').value = 'Albay';
  document.getElementById('addr-zip').value = address.zip || '';
}

async function loadCartCount() {
  try {
    const res = await fetch('cart_count.php');
    const data = await res.json();

    if (data.success) {
      document.querySelectorAll('.cart-count').forEach(el => {
        el.textContent = data.cart_count;
      });

      localStorage.setItem('fc_cart_count', String(data.cart_count));
    }
  } catch (err) {
    console.error('Error loading cart count:', err);
  }
}

loadCartCount();
loadProfileFromDB();
renderFooter('footer-container', false);
</script>
</body>
</html>
