<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FleurChase — Sign In</title>
<link rel="stylesheet" href="shared.css"/>
<style>

body{min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(155deg,var(--g9) 0%,white 40%,var(--p9) 100%)}
.auth-nav{position:fixed;top:0;left:0;right:0;height:64px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 2rem;z-index:100;gap:1rem}
.auth-nav .logo{font-family:var(--font-d);font-size:24px;font-weight:700;color:var(--g2);text-decoration:none}
.auth-nav .logo em{color:var(--p4);font-style:italic}
.auth-center{flex:1;display:flex;align-items:center;justify-content:center;padding:calc(64px + 2rem) 1.5rem 3rem}
.auth-box{background:white;border-radius:var(--rxl);border:1px solid var(--line);padding:2.5rem;max-width:430px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.1)}
.auth-brand{text-align:center;margin-bottom:1.8rem}
.auth-brand-name{font-family:var(--font-d);font-size:30px;font-weight:700;color:var(--g2)}
.auth-brand-name em{color:var(--p4);font-style:italic}
.auth-brand-sub{font-size:13px;color:var(--muted);margin-top:4px}
.tab-strip{display:flex;background:var(--soft);border-radius:var(--r);padding:3px;gap:3px;margin-bottom:1.6rem}
.tab-btn{flex:1;padding:9px;border-radius:8px;border:none;font-family:var(--font-b);font-size:13px;font-weight:500;cursor:pointer;background:none;color:var(--muted);transition:all .2s}
.tab-btn.active{background:white;color:var(--g2);box-shadow:0 1px 5px rgba(0,0,0,.08)}
.auth-panel{display:none}.auth-panel.active{display:block}
.auth-title{font-family:var(--font-d);font-size:24px;font-weight:700;color:var(--g1);text-align:center;margin-bottom:.25rem}
.auth-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:1.4rem}
.auth-ff{font-family:var(--font-d);font-size:24px;font-weight:700;color:var(--g1);text-align:center;margin-bottom:.25rem}
.forgot-link{text-align:right;margin:-6px 0 12px;font-size:12px}
.forgot-link a{color:var(--g3);cursor:pointer;text-decoration:none}
.forgot-link a:hover{text-decoration:underline}
.auth-switch{text-align:center;margin-top:1.1rem;font-size:13px;color:var(--muted)}
.auth-switch a{color:var(--g3);font-weight:600;cursor:pointer;text-decoration:none}
.pw-bars{display:flex;gap:4px;margin-top:5px}.pw-bar{flex:1;height:3px;border-radius:2px;background:var(--line);transition:background .3s}
.pw-bar.w{background:var(--p3)}.pw-bar.f{background:#FFA000}.pw-bar.g{background:var(--g4)}.pw-bar.s{background:var(--g2)}
.pw-label{font-size:11px;color:var(--muted);margin-top:3px}
</style>
</head>
<body>
<nav class="auth-nav">
  <a class="logo" href="index.html">FleurChase<em>.</em></a>
  <div style="flex:1"></div>
  <a href="index.html" style="font-size:13px;color:var(--muted);text-decoration:none">Back to Home</a>
</nav>
<div class="auth-center">
  <div class="auth-box">
    <div class="auth-brand"><div class="auth-brand-name">FleurChase<em>.</em></div><div class="auth-brand-sub">Albay's Premier Flower Shop</div></div>
    <div class="tab-strip">
      <button class="tab-btn active" id="tab-login" onclick="showPanel('login')">Sign In</button>
      <button class="tab-btn" id="tab-signup" onclick="showPanel('signup')">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div class="auth-panel active" id="panel-login">
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to your FleurChase account</div>
      <div class="role-tabs" style="margin-top:1rem">
      </div>
      <div class="ff"><label>Email address</label><input id="l-email" type="email"/></div>
      <div class="ff"><label>Password</label><input id="l-pass" type="password"/></div>
      <div class="forgot-link"><a onclick="toast('Password reset email sent!')">Forgot password?</a></div>

      <button class="btn btn-green" style="width:100%;justify-content:center;padding:13px;font-size:14px" onclick="doLogin(event)">Sign In</button>
      <div class="auth-switch">No account? <a onclick="showPanel('signup')">Sign up free</a></div>
    </div>

    <!-- SIGNUP -->
    <div class="auth-panel" id="panel-signup">
      <div class="auth-title">Create account</div>
      <div class="auth-sub">Join FleurChase and avail exciting promos!</div>
      <div class="fg2" style="margin-top:1rem">
        <div class="ff"><label>First name</label><input id="su-fn" placeholder="Maria"/></div>
        <div class="ff"><label>Last name</label><input id="su-ln" placeholder="Santos"/></div>
      </div>
      <div class="ff"><label>Email address</label><input id="su-email" type="email" placeholder="you@email.com"/></div>
      <div class="ff"><label>Phone number</label><input id="su-phone" placeholder="09XX XXX XXXX" maxlength="11"/></div>
      <div class="ff">
        <label>Password</label>
        <input id="su-pass" type="password" placeholder="Min. 8 characters" oninput="checkPW(this.value)"/>
        <div class="pw-bars" id="pw-bars"><div class="pw-bar" id="pb1"></div><div class="pw-bar" id="pb2"></div><div class="pw-bar" id="pb3"></div><div class="pw-bar" id="pb4"></div></div>
        <div class="pw-label" id="pw-lbl">Enter a password</div>
      </div>
      <div class="ff"><label>Confirm password</label><input id="su-pass2" type="password" placeholder="Re-enter password"/></div>
      <button class="btn btn-pink" style="width:100%;justify-content:center;padding:13px;font-size:14px;margin-top:.5rem" onclick="doSignup()">Create Account</button>
      <div class="auth-switch">Already have an account? <a onclick="showPanel('login')">Sign in</a></div>
    </div>
  </div>
</div>
<div id="fc-toast" class="toast"></div>
<script src="data.js"></script>
<script src="nav.js"></script>
<script>
let loginRole = 'customer';
const urlP = new URLSearchParams(window.location.search);
if (urlP.get('tab') === 'signup') showPanel('signup');
// Auto-redirect if already logged in
const existingUser = FC.getUser();
if (existingUser) location.href = existingUser.role === 'admin' ? 'admin.html' : 'shop.html';

function showPanel(p) {
  ['login','signup'].forEach(n => {
    document.getElementById('panel-'+n)?.classList.toggle('active', n===p);
    document.getElementById('tab-'+n)?.classList.toggle('active', n===p);
  });
}
function setRole(r) {
  loginRole = r;
  document.getElementById('lr-cust')?.classList.toggle('active', r==='customer');
  document.getElementById('lr-admin')?.classList.toggle('active', r==='admin');
}
function checkPW(v) {
  const bars = [1,2,3,4].map(i => document.getElementById('pb'+i));
  const lbl = document.getElementById('pw-lbl');
  bars.forEach(b => b && (b.className = 'pw-bar'));
  if (!v.length) { lbl.textContent = 'Enter a password'; return; }
  let s = 0;
  if (v.length >= 8) s++; if (v.length >= 12) s++;
  if (/[A-Z]/.test(v) && /[0-9]/.test(v)) s++;
  if (/[^A-Za-z0-9]/.test(v)) s++;
  const cls = ['w','f','g','s'], labels = ['Too short','Fair','Good','Strong!'];
  const colors = ['var(--p3)','#FFA000','var(--g4)','var(--g2)'];
  for (let i = 0; i < s; i++) bars[i] && (bars[i].className = 'pw-bar ' + cls[s-1]);
  lbl.textContent = labels[s-1] || 'Too short'; lbl.style.color = colors[s-1] || colors[0];
}

async function doLogin(event) {
  if (event) event.preventDefault();

  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;

  if (!email || !pass) {
    toast('Please enter your email and password.', 'err');
    return;
  }

  const formData = new FormData();
  formData.append('email', email);
  formData.append('password', pass);

  try {
    const res = await fetch('login.php', {
      method: 'POST',
      body: formData
    });

    const text = await res.text();
    console.log('Status:', res.status);
    console.log('Raw response:', text);

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      toast('Server returned invalid response.', 'err');
      return;
    }

    if (!data.success) {
      toast(data.message || 'Invalid email or password', 'err');
      return;
    }

    toast('Login successful!', 'success');

    const user = {
      email: data.email,
      role: data.role,
      name: data.role === 'admin' ? 'Admin' : 'Customer',
      initial: data.email[0].toUpperCase()
    };

    FC.setUser(user);

    setTimeout(() => {
      if (data.role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'customers-admin.html';
      }
    }, 500);

  } catch (error) {
    console.error('Login error:', error);
    toast('Cannot reach login.php. Check file path/server.', 'err');
  }
}

async function doSignup() {
  const fn = document.getElementById('su-fn').value.trim();
  const ln = document.getElementById('su-ln').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const phone = document.getElementById('su-phone').value.trim();
  const pass = document.getElementById('su-pass').value;
  const pass2 = document.getElementById('su-pass2').value;

  if (!fn || !ln || !email || !phone || !pass || !pass2) {
    toast('Please fill in all fields.', 'err');
    return;
  }

  if (pass !== pass2) {
    toast('Passwords do not match.', 'err');
    return;
  }

  const formData = new FormData();
  formData.append('first_name', fn);
  formData.append('last_name', ln);
  formData.append('email', email);
  formData.append('contact', phone);
  formData.append('password', pass);

  try {
    const res = await fetch('signup.php', {
      method: 'POST',
      body: formData
    });

    const text = await res.text();
    console.log('Signup response:', text);

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      toast('Server returned invalid response.', 'err');
      return;
    }

    if (!data.success) {
      toast(data.message || 'Signup failed.', 'err');
      return;
    }

    toast('Account created successfully!', 'success');

    const user = {
      email: data.email,
      role: data.role,
      name: fn + ' ' + ln,
      initial: fn[0].toUpperCase()
    };

    FC.setUser(user);

    setTimeout(() => {
      window.location.href = 'shop.html';
    }, 700);
  } catch (error) {
    console.error(error);
    toast('Cannot reach signup.php. Check file path/server.', 'err');
  }
}

</script>
</body>
</html>
