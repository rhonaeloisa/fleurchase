<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FleurChase — Admin Dashboard</title>
<link rel="stylesheet" href="shared.css"/>
<style>
/* ── Bar chart ─────────────────────────────────────────────────────────── */
.chart-card {
  border-radius: 4px;
  border: 1px solid var(--line);
  box-shadow: 0 14px 34px rgba(24, 38, 31, .08);
}
.chart-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 1.1rem;
}
.chart-title {
  font-size: 16px;
  font-weight: 800;
  color: var(--ink);
  letter-spacing: .2px;
}
.chart-sub {
  margin-top: 3px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
}
.chart-total {
  min-width: 78px;
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 8px 10px;
  text-align: right;
  background: linear-gradient(180deg, #fff, var(--soft));
}
.chart-total strong {
  display: block;
  font-size: 20px;
  line-height: 1;
  color: var(--g2);
}
.chart-total span {
  display: block;
  margin-top: 3px;
  font-size: 10px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 700;
}
.barchart {
  position: relative;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(58px, 1fr));
  align-items: end;
  gap: 12px;
  min-height: 280px;
  padding: 28px 10px 6px;
  border: 1px solid var(--line);
  border-radius: 4px;
  background:
    repeating-linear-gradient(to top, rgba(42, 64, 52, .08) 0 1px, transparent 1px 56px),
    linear-gradient(180deg, #fff, color-mix(in srgb, var(--soft) 52%, #fff));
  overflow: hidden;
}
.bcol {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-rows: 24px 1fr 42px;
  align-items: end;
  min-height: 246px;
}
.bplot {
  height: 190px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.bbar {
  width: min(100%, 46px);
  min-height: 8px;
  border-radius: 3px 3px 0 0;
  border: 1px solid rgba(18, 42, 28, .28);
  border-bottom: 0;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.35), 0 10px 18px rgba(21, 65, 39, .16);
  transition: transform .2s ease, filter .2s ease, height .4s ease;
}
.bbar:hover { transform: translateY(-3px); filter: brightness(1.04); }
.bbar-g { background: linear-gradient(180deg, var(--g5), var(--g2)); }
.bbar-p { background: linear-gradient(180deg, var(--p5), var(--p2)); }
.blbl {
  align-self: start;
  margin-top: 8px;
  color: var(--ink);
  font-size: 10px;
  font-weight: 700;
  line-height: 1.15;
  text-align: center;
  overflow: hidden;
  display: -webkit-box;

  -webkit-box-orient: vertical;
}
.bval {
  align-self: end;
  justify-self: center;
  width: fit-content;
  min-width: 28px;
  border-radius: 3px;
  padding: 3px 6px;
  background: var(--ink);
  color: white;
  font-size: 11px;
  font-weight: 800;
  line-height: 1;
}
.bmeta {
  display: block;
  margin-top: 2px;
  color: var(--muted);
  font-size: 9px;
  font-weight: 600;
}

/* ── Loading / error states ────────────────────────────────────────────── */
.dash-loading {
  display: flex;
  align-items: center;
  gap: .5rem;
  color: var(--muted);
  font-size: 13px;
  padding: .5rem 0;
}
.spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--muted);
  border-top-color: var(--g3);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.dash-error {
  color: var(--p3, #c44);
  font-size: 13px;
  padding: .5rem;
  border-left: 3px solid var(--p3, #c44);
}
</style>
</head>
<body>

<div id="top-nav" class="app-nav"></div>
<aside class="sidebar" id="fc-sidebar"></aside>

<div class="main-area">
<div class="p-page">

  <!-- ── Page header ─────────────────────────────────────────────────── -->
  <div style="display:flex;justify-content:space-between;align-items:flex-start;
              margin-bottom:2rem;flex-wrap:wrap;gap:1rem">
    <div>
      <div class="page-title">Dashboard</div>
      <div class="page-sub" id="dash-date" style="margin-bottom:0"></div>
    </div>
    <button class="btn btn-green btn-sm" id="refresh-btn">↻ Refresh</button>
  </div>

  <!-- ── Metric cards ────────────────────────────────────────────────── -->
  <div class="metrics-grid" id="dash-metrics">
    <div class="dash-loading"><div class="spinner"></div> Loading metrics…</div>
  </div>

  <!-- ── Recent orders + Top flowers chart ───────────────────────────── -->
  <div class="two-col">
    <div class="table-wrap">
      <div class="table-head">
        <h3>Recent Orders</h3>
        <a class="btn btn-ghost btn-sm" href="orders-admin.html" style="text-decoration: none;">View all</a>
      </div>
      <table class="data-table">
        <thead>
          <tr><th>Order #</th><th>Customer</th><th>Status</th><th>Total</th></tr>
        </thead>
        <tbody id="dash-orders">
          <tr><td colspan="4"><div class="dash-loading"><div class="spinner"></div> Loading orders…</div></td></tr>
        </tbody>
      </table>
    </div>

    <div class="card chart-card">
      <div class="chart-head">
        <div>
          <div class="chart-title">Top Flowers This Month</div>
          <div class="chart-sub">Ranked by bouquets sold</div>
        </div>
        <div class="chart-total" id="chart-total" style="display:none"></div>
      </div>
      <div class="barchart" id="dash-chart">
        <div class="dash-loading"><div class="spinner"></div> Loading…</div>
      </div>
    </div>
  </div>

  <!-- ── Freshness alerts + Quick actions ────────────────────────────── -->
  <div class="two-col">
    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:1rem;color:var(--ink)">
        ⚠ Freshness Alerts
      </div>
      <div id="dash-alerts">
        <div class="dash-loading"><div class="spinner"></div> Loading alerts…</div>
      </div>
    </div>

   
  </div>

</div><!-- /.p-page -->
</div><!-- /.main-area -->

<div id="fc-toast" class="toast"></div>

<!-- ── Your existing shared scripts ──────────────────────────────────────── -->
<script src="data.js"></script>
<script src="nav.js"></script>

<!-- ── Dashboard logic ───────────────────────────────────────────────────── -->
<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// Change this path if dashboard_api.php lives in a subfolder, e.g. '/api/dashboard_api.php'
// ─────────────────────────────────────────────────────────────────────────────
const API_URL = 'db/dashboard_api.php';

// ── Auth + nav (unchanged from original) ─────────────────────────────────────
const user = requireAuth('admin');
buildTopNav('admin');
buildAdminSidebar('admin.html');

// ── Date header ───────────────────────────────────────────────────────────────
document.getElementById('dash-date').textContent = new Date().toLocaleDateString('en-PH', {
  weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
});

// ── Status badge colours (keep in sync with your shared.css tags) ─────────────
const STATUS_CLS = {
  'Pending':          'tag-a',
  'Processing':       'tag-b',
  'Out for Delivery': 'tag-g',
  'Delivered':        'tag-w',
  'Cancelled':        'tag-r',
};

// ── PHP money formatter ───────────────────────────────────────────────────────
function fmtPHP(amount) {
  return '₱' + Number(amount).toLocaleString('en-PH', {
    minimumFractionDigits: 2, maximumFractionDigits: 2
  });
}

// ── Generic error renderer ────────────────────────────────────────────────────
function showError(elId, msg) {
  document.getElementById(elId).innerHTML =
    `<div class="dash-error">⚠ ${msg}</div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER FUNCTIONS
// Each function receives the JSON slice from the API and updates the DOM.
// ─────────────────────────────────────────────────────────────────────────────

function renderMetrics(data) {
  const cards = [
    {
      label : 'Total Orders',
      val   : data.total_orders.toLocaleString(),
      sub   : 'All time',
      cls   : 'metric-n',
      warn  : false,
    },
    {
      label : 'Revenue (Est.)',
      val   : fmtPHP(data.revenue),
      sub   : 'All orders',
      cls   : 'metric-up',
      warn  : false,
    },
    {
      label : 'Pending Orders',
      val   : data.pending_orders,
      sub   : 'Awaiting action',
      cls   : 'metric-dn',
      warn  : data.pending_orders > 0,
    },
    {
      label : 'Low Stock Items',
      val   : data.low_stock,
      sub   : 'Below 30 stems',
      cls   : 'metric-n',
      warn  : data.low_stock > 0,
    },
  ];

  document.getElementById('dash-metrics').innerHTML = cards.map(c => `
    <div class="metric-card">
      <div class="metric-label">${c.label}</div>
      <div class="metric-val" ${c.warn ? 'style="color:var(--p3)"' : ''}>${c.val}</div>
      <div class="metric-sub ${c.cls}">${c.sub}</div>
    </div>
  `).join('');
}

function renderOrders(rows) {
  if (!rows.length) {
    document.getElementById('dash-orders').innerHTML =
      '<tr><td colspan="4" style="text-align:center;color:var(--muted)">No orders yet.</td></tr>';
    return;
  }
  document.getElementById('dash-orders').innerHTML = rows.map(o => `
    <tr>
      <td style="font-weight:700;font-size:12px">${o.order_id}</td>
      <td>${o.order_name || '—'}</td>
      <td><span class="tag ${STATUS_CLS[o.status] || 'tag-w'}">${o.status}</span></td>
      <td>${fmtPHP(o.total_amount)}</td>
    </tr>
  `).join('');
}

function renderChart(flowers) {
  if (!flowers.length) {
    document.getElementById('dash-chart').innerHTML =
      '<div style="color:var(--muted);font-size:13px;align-self:center;justify-self:center">No bouquet sales recorded this month.</div>';
    document.getElementById('chart-total').style.display = 'none';
    return;
  }
  const maxVal = Math.max(...flowers.map(f => Number(f.chart_val) || 0), 1);
  const totalSold = flowers.reduce((sum, f) => sum + (Number(f.sold_qty) || 0), 0);
  const totalBox = document.getElementById('chart-total');
  totalBox.style.display = 'block';
  totalBox.innerHTML = `<strong>${totalSold}</strong><span>Sold</span>`;

  document.getElementById('dash-chart').innerHTML = flowers.map((f, i) => {
    const sold = Number(f.sold_qty) || 0;
    const height = Math.max(10, Math.round(((Number(f.chart_val) || 0) / maxVal) * 190));

    return `
      <div class="bcol">
        <div class="bval">${sold}</div>
        <div class="bplot">
          <div class="bbar ${i % 2 === 1 ? 'bbar-p' : 'bbar-g'}"
               style="height:${height}px"
               title="${f.name}: ${sold} sold this month"></div>
        </div>
        <div class="blbl">${f.name}<span class="bmeta">${fmtPHP(f.revenue || 0)}</span></div>
      </div>
    `;
  }).join('');
}

function renderAlerts(items) {
  if (!items.length) {
    document.getElementById('dash-alerts').innerHTML =
      '<div class="alert alert-g">✅ All stock is well within freshness dates!</div>';
    return;
  }
  document.getElementById('dash-alerts').innerHTML = items.map(item => {
    const daysLeft = parseInt(item.days_left, 10);
    const urgency  = daysLeft <= 0 ? 'alert-r' : (daysLeft <= 2 ? 'alert-a' : '');
    const label    = daysLeft < 0
      ? `expired ${Math.abs(daysLeft)}d ago`
      : daysLeft === 0
        ? 'expires TODAY'
        : `${daysLeft}d left`;

    return `
      <div class="alert ${urgency}" style="margin-bottom:6px">
        🌸 <strong>${item.name}</strong>
        — ${item.stock} in stock
        · <span style="font-weight:600">${label}</span>
        <span style="opacity:.6;font-size:11px"> (${item.best_before})</span>
      </div>
    `;
  }).join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN LOAD FUNCTION
// Fetches all dashboard data in one request (?action=all)
// and dispatches to each render function.
// ─────────────────────────────────────────────────────────────────────────────
async function loadDashboard() {
  // Reset refresh button
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = '↻ Refreshing…';

  try {
    const res = await fetch(`${API_URL}?action=all`, {
      headers: { 'Accept': 'application/json' },
      // Prevent browser from serving a stale cached response
      cache: 'no-cache',
    });

    if (!res.ok) {
      throw new Error(`Server responded ${res.status} ${res.statusText}`);
    }

    const data = await res.json();

    // If the API itself returned an error object
    if (data.error) {
      throw new Error(data.error);
    }

    // Render each section
    renderMetrics(data.metrics);
    renderOrders(data.orders);
    renderChart(data.top_flowers);
    renderAlerts(data.alerts);

  } catch (err) {
    console.error('[Dashboard] Failed to load:', err);

    // Show inline errors in each section so the page doesn't just go blank
    const errMsg = err.message || 'Could not connect to the server.';
    showError('dash-metrics', errMsg);
    showError('dash-orders',  errMsg);
    showError('dash-chart',   errMsg);
    showError('dash-alerts',  errMsg);

    // Also surface in toast if available
    if (typeof showToast === 'function') {
      showToast('Dashboard failed to load: ' + errMsg, 'error');
    }
  } finally {
    btn.disabled = false;
    btn.textContent = '↻ Refresh';
  }
}

// ── Wire up refresh button ────────────────────────────────────────────────────
document.getElementById('refresh-btn').addEventListener('click', loadDashboard);

// ── Initial load ──────────────────────────────────────────────────────────────
loadDashboard();
</script>
</body>
</html>
