<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FleurChase — Admin Dashboard</title>
<link rel="stylesheet" href="shared.css"/>
<style>
.barchart{
  display:flex;
  align-items:flex-end;
  gap:8px;
  height:110px;
  padding:0 .5rem
}

.bcol{
  display:flex;
  flex-direction:column;
  align-items:center;
  flex:1;gap:4px
}

.bbar{
  width:100%;
  border-radius:5px 5px 0 0;
  min-height:4px;
  transition:opacity .2s
}

.bbar:hover{
  opacity:.8
}

.bbar-g{
  background:linear-gradient(to top,var(--g3),var(--g5))
}

.bbar-p{
  background:linear-gradient(to top,var(--p2),var(--p5))
}

.blbl{
  font-size:10px;
  color:var(--muted);
  text-align:center
}
 
.bval{
  font-size:10px;
  font-weight:600;
  color:var(--g3)
}
</style>
</head>
<body>
<div id="top-nav" class="app-nav"></div>
<aside class="sidebar" id="fc-sidebar"></aside>
<div class="main-area">
<div class="p-page">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2rem;flex-wrap:wrap;gap:1rem">
    <div><div class="page-title">Dashboard</div><div class="page-sub" id="dash-date" style="margin-bottom:0"></div></div>
    <button class="btn btn-green btn-sm" onclick="location.reload()">↻ Refresh</button>
  </div>
  <div class="metrics-grid" id="dash-metrics"></div>
  <div class="two-col">
    <div class="table-wrap">
      <div class="table-head"><h3>Recent Orders</h3><a class="btn btn-ghost btn-sm" href="orders-admin.html">View all</a></div>
      <table class="data-table"><thead><tr><th>Order #</th><th>Customer</th><th>Status</th><th>Total</th></tr></thead><tbody id="dash-orders"></tbody></table>
    </div>
    <div class="card">
      <div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:1rem">Top Flowers This Month</div>
      <div class="barchart" id="dash-chart"></div>
    </div>
  </div>
  <div class="two-col">
    <div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:1rem;color:var(--ink)">⚠ Freshness Alerts</div><div id="dash-alerts"></div></div>
    <div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:1rem;color:var(--ink)">Quick Actions</div>
      <div class="two-col" style="gap:8px">
        <a class="btn btn-green btn-sm" href="orders-admin.html" style="justify-content:center;text-decoration:none">📦 Process Orders</a>
        <button class="btn btn-ghost btn-sm" onclick="location.href='products-admin.html'">+ Add Product</button>
        <button class="btn btn-ghost btn-sm" onclick="location.href='inventory-admin.html'">🌿 Check Stock</button>
        <button class="btn btn-ghost btn-sm" onclick="location.href='reports-admin.html'">📋 Reports</button>
      </div>
    </div>
  </div>
</div>
</div>
<div id="fc-toast" class="toast"></div>
<script src="data.js"></script>
<script src="nav.js"></script>
<script>
  
const user = requireAuth('admin');
buildTopNav('admin');
buildAdminSidebar('admin.html');
document.getElementById('dash-date').textContent = new Date().toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

const orders = FC.getOrders();
const pending = orders.filter(o => (o.payStatus === 'uploaded' || o.payStatus === 'cod-pending') && o.status === 'Pending').length;
const inv = FC.getInventory();

// Metrics
document.getElementById('dash-metrics').innerHTML = [
  {label:'Total Orders',val:orders.length,sub:'All time',cls:'metric-n'},
  {label:'Revenue (Est.)',val:'₱'+orders.reduce((s,o)=>s+o.total,0).toLocaleString(),sub:'All orders',cls:'metric-up'},
  {label:'Pending Validation',val:pending,sub:'Awaiting review',cls:'metric-dn'},
  {label:'Low Stock Items',val:inv.filter(i=>i.stock<30).length,sub:'Below 30 stems',cls:'metric-n'},
].map(m=>`<div class="metric-card"><div class="metric-label">${m.label}</div><div class="metric-val" style="${m.cls==='metric-dn'&&m.val>0?'color:var(--p3)':''}">${m.val}</div><div class="metric-sub ${m.cls}">${m.sub}</div></div>`).join('');

// Recent orders
const sc = {Pending:'tag-a',Processing:'tag-b','Out for Delivery':'tag-g',Delivered:'tag-w'};
document.getElementById('dash-orders').innerHTML = orders.slice(0,5).map(o=>`
  <tr><td style="font-weight:700;font-size:12px">${o.id}</td><td>${o.customer||o.cust||'—'}</td><td><span class="tag ${sc[o.status]||'tag-w'}">${o.status}</span></td><td>${fmtP(o.total)}</td></tr>
`).join('');

// Chart
const flowerData = [{l:'Roses',v:85,p:true},{l:'Tulips',v:60},{l:'Sunflowers',v:45},{l:'Peonies',v:38,p:true},{l:'Lilies',v:30},{l:'Gerbera',v:25}];
const maxV = Math.max(...flowerData.map(d=>d.v));
document.getElementById('dash-chart').innerHTML = flowerData.map(d=>`
  <div class="bcol"><div class="bval" style="color:${d.p?'var(--p3)':'var(--g3)'}">${d.v}</div><div class="bbar ${d.p?'bbar-p':'bbar-g'}" style="height:${Math.round((d.v/maxV)*95)}px"></div><div class="blbl">${d.l}</div></div>
`).join('');

// Alerts
const alerts = FC.getInventory().filter(i=>i.freshness<=40).sort((a,b)=>a.freshness-b.freshness);
document.getElementById('dash-alerts').innerHTML = alerts.map(i=>`
  <div class="alert ${i.freshness<=15?'alert-r':'alert-a'}">${i.icon} <strong>${i.name}</strong> — ${i.freshness}% freshness · ${i.stock} stems</div>
`).join('')||`<div class="alert alert-g">✅ All stock is in good condition!</div>`;
</script>
</body>
</html>
