<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FleurChase — Orders Admin</title>
<link rel="stylesheet" href="shared.css"/>
<style>
/* ── RECEIPT ── */
.receipt-img{max-width:100%;max-height:250px;border-radius:var(--r);border:1px solid var(--line);object-fit:contain;display:block;margin:0 auto}
.receipt-placeholder{background:var(--soft);border-radius:var(--r);border:1px dashed var(--line);height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:13px;gap:6px}
/* ── DETAIL MODAL ── */
.detail-modal-box{background:white;border-radius:var(--rxl);padding:0;max-width:680px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.18);transform:translateY(14px);transition:transform .22s}
.modal-overlay.open .detail-modal-box{transform:translateY(0)}
.dm-header{background:linear-gradient(135deg,var(--g1),var(--g3));color:white;padding:1.4rem 1.6rem;border-radius:var(--rxl) var(--rxl) 0 0;display:flex;justify-content:space-between;align-items:flex-start}
.dm-header h2{font-family:var(--font-d);font-size:22px;font-weight:700;margin-bottom:.3rem}
.dm-header p{font-size:12px;opacity:.75}
.dm-close{background:rgba(255,255,255,.2);border:none;color:white;width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0;margin-left:.5rem}
.dm-close:hover{background:rgba(255,255,255,.35)}
.dm-body{padding:1.4rem 1.6rem}
.dm-section{margin-bottom:1.4rem}
.dm-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:.7rem;display:flex;align-items:center;gap:6px}
.dm-section-title::after{content:'';flex:1;height:1px;background:var(--line)}
.dm-grid2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.dm-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem}
.dm-field{background:var(--soft);border-radius:var(--r);padding:.6rem .8rem}
.dm-field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);display:block;margin-bottom:3px}
.dm-field span{font-size:13px;color:var(--ink);font-weight:500;word-break:break-word}
.dm-field span.green{color:var(--g3);font-weight:700}
.dm-field span.pink{color:var(--p3);font-weight:700}
/* Order items list */
.dm-item{display:flex;align-items:center;gap:10px;padding:.6rem .8rem;background:white;border-radius:var(--r);border:1px solid var(--line);margin-bottom:6px}
.dm-item-icon{font-size:22px;width:40px;height:40px;background:var(--soft);border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.dm-item-icon img{width:100%;height:100%;object-fit:cover}
.dm-item-info{flex:1}
.dm-item-name{font-size:13px;font-weight:600;color:var(--ink)}
.dm-item-sub{font-size:11px;color:var(--muted);margin-top:2px}
.dm-item-price{font-size:13px;font-weight:700;color:var(--g3);flex-shrink:0}
/* Price breakdown */
.dm-price-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px dashed var(--line)}
.dm-price-row:last-child{border:none}
.dm-price-row.total-row{font-size:15px;font-weight:700;color:var(--ink);padding-top:8px;border-top:2px solid var(--line);border-bottom:none}
.dm-price-row.disc-row{color:var(--p3);font-weight:500}
/* Gift message */
.dm-gift-msg{background:var(--p9);border:1px solid var(--p6);border-radius:var(--r);padding:.8rem 1rem;font-size:13px;color:var(--p2);line-height:1.6;font-style:italic}
/* Status badges inline */
.dm-action-bar{display:flex;gap:8px;flex-wrap:wrap;padding:1rem 1.6rem;border-top:1px solid var(--line);background:var(--soft);border-radius:0 0 var(--rxl) var(--rxl)}

.order-tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.status-tab {
  border: 1.5px solid var(--line);
  background: white;
  padding: 8px 14px;
  border-radius: var(--r);
  cursor: pointer;
  font-family: var(--font-b);
  font-size: 13px;
}

.status-tab.active {
  background: var(--g3);
  color: white;
  border-color: var(--g3);
}

.order-search{
  display:flex;
  gap:8px;
  align-items:center;
  margin-bottom:1rem;
  flex-wrap:wrap;
}

.order-search input{
  flex:1;
  min-width:240px;
  border:1.5px solid var(--line);
  background:white;
  border-radius:var(--r);
  padding:10px 12px;
  font-family:var(--font-b);
  font-size:13px;
  outline:none;
}

.order-search input:focus{
  border-color:var(--g3);
}
</style>
</head>
<body>
<div id="top-nav" class="app-nav"></div>
<aside class="sidebar" id="fc-sidebar"></aside>
<div class="main-area">
<div class="p-page">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2rem;flex-wrap:wrap;gap:1rem">
    <div><div class="page-title">Orders</div><div class="page-sub" style="margin-bottom:0">Manage, validate, and update customer pre-orders</div></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <div class="order-tabs">
          <button class="status-tab active" onclick="setOrderView('Pending', this)">Pending</button>
          <button class="status-tab" onclick="setOrderView('Processing', this)">Processing</button>
          <button class="status-tab" onclick="setOrderView('Out for Delivery', this)">Out for Delivery</button>
          <button class="status-tab" onclick="setOrderView('Delivered', this)">Delivered</button>
          <button class="status-tab" onclick="setOrderView('Completed', this)">Completed</button>
          <button class="status-tab" onclick="setOrderView('Cancelled', this)">Cancelled</button>
      </div>
      </select>
    </div>
  </div>
 <div class="order-search">
  <input
  id="order-search"
  type="text"
  placeholder="Search orders by ID, item, status, address..."
  oninput="searchOrders()"
/>

<button class="btn btn-green" onclick="searchOrders()">Search</button>
<button class="btn btn-ghost" onclick="clearOrderSearch()">Clear</button>
</div>
  <div class="table-wrap">
    <div class="table-head"><h3>All Orders</h3><span id="ord-count" style="font-size:12px;color:var(--muted)"></span></div>
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead><tr>
          <th>Order #</th>
          <th>Customer</th>
          <th>Phone</th>
          <th>Items</th>
          <th>Delivery</th>
          <th>Payment</th>
          <th>Status</th>
          <th>Total</th>
          <th style="min-width:160px">Actions</th>
        </tr></thead>
        <tbody id="ord-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
</div>

<!-- ── VIEW DETAILS MODAL ── -->
<div class="modal-overlay" id="detail-modal">
  <div class="detail-modal-box">
    <div id="detail-content"></div>
  </div>
</div>

<!-- ── VALIDATE MODAL ── -->
<div class="modal-overlay" id="validate-modal">
  <div class="modal-box" style="max-width:540px">
    <div class="modal-head"><h3>Validate Payment</h3><button class="modal-close" onclick="closeModal('validate-modal')">✕</button></div>
    <div id="vm-body"></div>
  </div>
</div>

<!-- ── UPDATE STATUS MODAL ── -->
<div class="modal-overlay" id="update-modal">
  <div class="modal-box" style="max-width:400px">
    <div class="modal-head"><h3>Update Order Status</h3><button class="modal-close" onclick="closeModal('update-modal')">✕</button></div>
    <div id="um-body"></div>
  </div>
</div>

<div id="fc-toast" class="toast"></div>
<script src="data.js"></script><script src="nav.js"></script>
<script>
requireAuth('admin');
buildTopNav('orders-admin');
buildAdminSidebar('orders-admin.html');

const STATUS_CLASS = {Pending:'tag-a',Processing:'tag-b','Out for Delivery':'tag-g',Delivered:'tag-w',Cancelled:'tag-p'};
const PAY_ICON     = {'GCash 50% Deposit':'','Full GCash Payment':'','Cash on Delivery':''};

let DB_ORDERS = [];
let ORDER_QUERY = '';

function searchOrders() {
  ORDER_QUERY = document.getElementById('order-search')?.value.trim().toLowerCase() || '';
  renderOrders();
}

function clearOrderSearch() {
  ORDER_QUERY = '';
  const input = document.getElementById('order-search');
  if (input) input.value = '';
  renderOrders();
}

function matchesOrderSearch(o) {
  if (!ORDER_QUERY) return true;

  const haystack = [
    o.id,
    o.items,
    o.status,
    o.full_address,
    o.delivDate,
    o.delivTime,
    o.payMethod,
    ...(o.itemDetails || []).map(it => it.name)
  ].join(' ').toLowerCase();

  return haystack.includes(ORDER_QUERY);
}

async function loadOrders() {
  try {
    const res = await fetch("get_orders.php");
    DB_ORDERS = await res.json();
    renderOrders();
  } catch (error) {
    console.error(error);
    toast("Cannot load orders from database.", "err");
  }
}

let CURRENT_VIEW = 'Pending';

function setOrderView(status, btn) {
  CURRENT_VIEW = status;

  document.querySelectorAll('.status-tab').forEach(b => {
    b.classList.remove('active');
  });

  btn.classList.add('active');
  renderOrders();
}

// ── ORDERS TABLE ────────────────────────────────────────────────────────────
function renderOrders() {
  const orders = DB_ORDERS;
  const list = orders.filter(o => o.status === CURRENT_VIEW && matchesOrderSearch(o));
  document.getElementById('ord-count').textContent = list.length + ' order' + (list.length !== 1 ? 's' : '');

  document.getElementById('ord-tbody').innerHTML = list.map(o => {
    const payIcon = PAY_ICON[o.payMethod];
    const payStatusLabel = o.payStatus === 'verified' ? 'Verified ✓'
      : o.payStatus === 'rejected' ? 'Rejected'
      : o.payStatus === 'cod-pending' ? 'COD'
      : o.payStatus === 'uploaded' ? 'Uploaded'
      : 'Pending';
    const payStatusCls = o.payStatus === 'verified' ? 'tag-g'
      : o.payStatus === 'rejected' ? 'tag-p'
      : o.payStatus === 'cod-pending' ? 'tag-w' : 'tag-a';
    return `
    <tr>
      <td style="font-weight:700;font-size:12px">${o.id}</td>
      <td>${o.customer||'—'}<br><span style="font-size:11px;color:var(--muted)"></span></td>
      <td style="font-size:12px">
        ${o.phone?`<a href="tel:${o.phone}" style="color:var(--g3);font-weight:600;text-decoration:none">${o.phone}</a>`:'<span style="color:var(--muted)">—</span>'}
      </td>
      <td style="font-size:12px;max-width:150px">
        ${o.items}
        ${o.giftMsg?`<br><span style="font-size:10px;color:var(--p3)">"${o.giftMsg.slice(0,28)}${o.giftMsg.length>28?'…':''}"</span>`:''}
      </td>
      <td style="font-size:12px">${o.delivDate||'—'}<br><span style="font-size:11px;color:var(--muted)">${o.delivTime||''}</span></td>
      <td style="font-size:12px">${payIcon} ${o.payMethod||'—'}<br><span class="tag ${payStatusCls}" style="margin-top:3px;display:inline-block">${payStatusLabel}</span></td>
      <td><span class="tag ${STATUS_CLASS[o.status]||'tag-w'}">${o.status}</span></td>
      <td style="font-weight:600">${fmtP(o.total)}${o.discount?`<br><span style="font-size:10px;color:var(--p3)">−${fmtP(o.discount)} disc</span>`:''}</td>
      <td>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          <button class="btn btn-outline btn-sm" style="font-size:11px" onclick="openDetail('${o.id}')">Details</button>
          ${getNextStatusButton(o)}
        </div>
      </td>
    </tr>`;
  }).join('') || `<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--muted)">No orders found</td></tr>`;
}

function getNextStatusButton(o) {
  if (o.status === 'Pending') {
    if (o.payStatus === 'uploaded') {
      return `<button class="btn btn-green" onclick="closeModal('detail-modal');openValidate('${o.id}')">Verify Receipt</button>`;
    }

    return `<span style="font-size:12px;color:var(--muted)">Waiting for receipt</span>`;
  }

  if (o.status === 'Processing') {
    return `<button class="btn btn-green" onclick="updateStatus('${o.id}', 'Out for Delivery')">Mark Out for Delivery</button>`;
  }

  if (o.status === 'Out for Delivery') {
    return `<button class="btn btn-green" onclick="updateStatus('${o.id}', 'Delivered')">Mark Delivered</button>`;
  }

  if (o.status === 'Delivered') {
    return `<button class="btn btn-green" onclick="updateStatus('${o.id}', 'Completed')">Completed</button>`;
  }

  return '';
}

// ── VIEW DETAILED ORDER ──────────────────────────────────────────────────────
function openDetail(id) {
  const o = DB_ORDERS.find(x => x.id === id);
  if (!o) return;

  const receiptSrc = o.receiptImg || o.receipt || '';

  const payStatusLabel = o.payStatus === 'verified' ? 'Verified'
    : o.payStatus === 'rejected' ? 'Rejected'
    : o.payStatus === 'uploaded' ? 'Receipt Uploaded — Awaiting Review'
    : '⏳ Pending';

  const payStatusColor = o.payStatus === 'verified'
    ? 'var(--g3)'
    : o.payStatus === 'rejected'
      ? 'var(--p3)'
      : 'var(--muted)';

    // Build items list
  // Build items list
  const itemRows = o.items && o.items !== '—'
    ? o.items.split('||').map(item => {
        const parts = item.split(' - ₱');
        return `
          <div class="dm-item">
            <div class="dm-item-info">
              <div class="dm-item-name">${parts[0] || item}</div>
              <div class="dm-item-sub">Ordered item</div>
            </div>
            <div class="dm-item-price">${parts[1] ? '₱' + parts[1] : ''}</div>
          </div>
        `;
      }).join('')
    : `<div style="font-size:12px;color:var(--muted);padding:.5rem">No item details recorded</div>`;

  // Build add-ons list
  const addonRows = `<div style="font-size:12px;color:var(--muted);padding:.5rem 0">No add-ons recorded</div>`;
    // Price breakdown
  const deposit = o.payMethod && o.payMethod.includes('50%') ? Math.ceil(o.total/2) : null;

  document.getElementById('detail-content').innerHTML = `
    <!-- HEADER -->
    <div class="dm-header">
      <div>
        <h2>Order ${o.id}</h2>
        <p>Placed ${o.placedAt ? new Date(o.placedAt).toLocaleString('en-PH',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}) : '—'}</p>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="tag ${STATUS_CLASS[o.status]||'tag-w'}" style="font-size:11px">${o.status}</span>
        <button class="dm-close" onclick="closeModal('detail-modal')">✕</button>
      </div>
    </div>

    <div class="dm-body">

      <!-- CUSTOMER INFO -->
      <div class="dm-section">
        <div class="dm-section-title">Customer Information</div>
        <div class="dm-grid2">
          <div class="dm-field"><label>Full Name</label><span>${o.customer||'—'}</span></div>
          <div class="dm-field"><label>Phone Number</label><span>${o.phone?`<a href="tel:${o.phone}" style="color:var(--g3);text-decoration:none;font-weight:600">${o.phone}</a>`:'—'}</span></div>
          <div class="dm-field" style="grid-column:1/-1"><label>Delivery Address</label><span>${o.full_address||'—'}</span></div>
        </div>
      </div>

      <!-- DELIVERY -->
      <div class="dm-section">
        <div class="dm-section-title">Delivery Details</div>
        <div class="dm-grid3">
          <div class="dm-field"><label>Municipality</label><span>${o.city||'—'}</span></div>
          <div class="dm-field"><label>Delivery Date</label><span>${o.delivDate||'—'}</span></div>
          <div class="dm-field"><label>Time Slot</label><span>${o.delivTime||'—'}</span></div>
        </div>
      </div>

      <!-- ORDER ITEMS -->
      <div class="dm-section">
        <div class="dm-section-title">Order Items</div>
        ${itemRows}
      </div>

      <!-- ADD-ONS -->
      <div class="dm-section">
        <div class="dm-section-title">Add-ons</div>
        ${addonRows}
      </div>

      <!-- GIFT MESSAGE -->
      ${o.giftMsg ? `
      <div class="dm-section">
        <div class="dm-section-title">Gift Message</div>
        <div class="dm-gift-msg">"${o.giftMsg}"</div>
      </div>` : ''}

      <!-- PAYMENT & PRICING -->
      <div class="dm-section">
        <div class="dm-section-title">Payment & Pricing</div>
        <div class="dm-grid2" style="margin-bottom:.8rem">
          <div class="dm-field"><label>Payment Method</label><span>${o.payMethod||'—'}</span></div>
          <div class="dm-field"><label>Payment Status</label><span style="color:${payStatusColor};font-weight:600">${payStatusLabel}</span></div>
          ${o.promo||o.promoLabel?`<div class="dm-field"><label>Promo Applied</label><span style="color:var(--p3)">${o.promo||o.promoLabel}</span></div>`:''}
          ${o.refNum?`<div class="dm-field"><label>Reference #</label><span style="font-family:monospace">${o.refNum}</span></div>`:''}
        </div>
        <div style="background:var(--soft);border-radius:var(--r);padding:.8rem 1rem">
          <div class="dm-price-row"><span style="color:var(--muted)">Items subtotal</span><span>${fmtP(o.sub||o.total)}</span></div>
          ${o.addonTotal?`<div class="dm-price-row"><span style="color:var(--muted)">Add-ons</span><span>${fmtP(o.addonTotal)}</span></div>`:''}
          ${o.discount?`<div class="dm-price-row disc-row"><span>Discount (${o.promo||o.promoLabel||'promo'})</span><span>−${fmtP(o.discount)}</span></div>`:''}
          ${o.shippingFee?`<div class="dm-price-row"><span style="color:var(--muted)">Shipping fee</span><span>${fmtP(o.shippingFee)}</span></div>`:`<div class="dm-price-row"><span style="color:var(--muted)">Shipping fee</span><span style="color:var(--g3)">FREE</span></div>`}
          <div class="dm-price-row total-row"><span>Total</span><span style="color:var(--g3)">${fmtP(o.total)}</span></div>
          ${deposit?`<div style="margin-top:.5rem;font-size:12px;color:var(--muted)">50% deposit paid: <strong style="color:var(--g3)">${fmtP(deposit)}</strong> · Balance on delivery: <strong>${fmtP(o.total-deposit)}</strong></div>`:''}
        </div>
      </div>

      <!-- RECEIPT -->
      <div class="dm-section">
      <div class="dm-section-title">Payment Receipt</div>
      <div id="detail-receipt-${o.id}">
        ${receiptSrc ? `
          <a href="${receiptSrc}" target="_blank" style="display:inline-block">
            <img src="${receiptSrc}"
                alt="Payment receipt"
                style="max-width:260px;width:100%;border-radius:10px;border:1px solid var(--line);object-fit:cover"/>
          </a>
          <div style="font-size:11px;color:var(--muted);margin-top:6px">
            Click image to view full receipt
          </div>
        ` : `
          <div style="font-size:12px;color:var(--muted)">No receipt uploaded.</div>
        `}
      </div>
    </div>

    <!-- ACTION BAR -->
    <div class="dm-action-bar">
      ${getNextStatusButton(o)}
      <button class="btn btn-ghost" onclick="closeModal('detail-modal')" style="margin-left:auto">Close</button>
    </div>
  `;

  openModal('detail-modal');
}

// ── VIEW RECEIPT (quick modal) ───────────────────────────────────────────────
function viewReceipt(id) {
  const o = DB_ORDERS.find(x => x.id === id);

  const receiptSrc = localStorage.getItem('fc_receipt_' + id)
    || o?.receiptImg
    || o?.receipt
    || null;

  if (!receiptSrc) {
    toast('No receipt image found.', 'err');
    return;
  }

  document.getElementById('vm-body').innerHTML = `
    <p style="font-size:13px;color:var(--muted);margin-bottom:1rem">${o?.id} · ${o?.customer || '—'} · ${o?.payMethod || '—'}</p>
    <img src="${receiptSrc}" class="receipt-img" alt="Receipt"
      onerror="this.style.display='none';this.nextSibling.style.display='block'"/>
    <div style="display:none;background:var(--soft);border-radius:var(--r);padding:1rem;text-align:center;color:var(--muted);font-size:13px">Image could not be loaded</div>
    <div style="text-align:center;margin-top:.5rem;font-size:12px;color:var(--muted)">${o?.receiptFile || 'Receipt image'}</div>
  `;

  openModal('validate-modal');
}

// ── VALIDATE PAYMENT ─────────────────────────────────────────────────────────
function openValidate(id) {
  const o = DB_ORDERS.find(x => x.id === id);
  if (!o) return;

  const rawReceipt = localStorage.getItem('fc_receipt_' + id)
    || o.receiptImg
    || o.receipt
    || '';

  const receiptSrc = rawReceipt && rawReceipt.startsWith('data:image')
    ? rawReceipt
    : rawReceipt
      ? rawReceipt
      : null;

  document.getElementById('vm-body').innerHTML = `
    <div style="background:var(--soft);border-radius:var(--r);padding:10px 12px;margin-bottom:1rem;font-size:13px">
      <div style="font-weight:600;color:var(--ink)">${o.id} · ${o.customer || '—'}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:3px">
        ${o.payMethod || '—'} · Total:
        <strong style="color:var(--g3)">${fmtP(o.total)}</strong>
        · Deposit: <strong>${fmtP(Math.ceil(o.total / 2))}</strong>
      </div>
      ${o.giftMsg ? `<div style="font-size:12px;margin-top:6px;background:var(--p9);border-radius:6px;padding:6px 8px;color:var(--p2)"><strong>Gift message:</strong> ${o.giftMsg}</div>` : ''}
    </div>

    ${receiptSrc
      ? `<div style="text-align:center;margin-bottom:.5rem">
          <a href="${receiptSrc}" target="_blank">
            <img src="${receiptSrc}"
              class="receipt-img"
              alt="Payment receipt"
              style="max-height:260px;max-width:100%;border-radius:10px;border:1px solid var(--line);object-fit:contain"
              onerror="this.style.display='none';this.parentElement.nextElementSibling.style.display='block'"/>
          </a>
          <div style="display:none;background:var(--soft);border-radius:var(--r);padding:1rem;text-align:center;color:var(--muted);font-size:13px">
            Receipt image could not be loaded.
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">
            ${o.receiptFile || 'Click receipt to view full image'}
          </div>
        </div>`
      : `<div class="receipt-placeholder">
          <span style="font-size:28px"></span>
          <span>No receipt uploaded yet</span>
        </div>`}

    <div class="ff" style="margin-top:1rem">
      <label>GCash Reference #</label>
      <input id="ref-num" placeholder="Enter reference number from receipt" style="font-family:monospace"/>
    </div>

    <div style="display:flex;gap:8px;margin-top:1rem">
      <button class="btn btn-green" style="flex:1;justify-content:center" onclick="approveOrder('${id}')">Approve & Verify</button>
      <button class="btn btn-danger" style="flex:1;justify-content:center" onclick="rejectOrder('${id}')">Reject</button>
    </div>`;

  openModal('validate-modal');
}

async function approveOrder(id) {
  const refNum = document.getElementById('ref-num')?.value || '';

  if (!confirm('Approve this payment and move the order to Processing?')) {
    return;
  }

  try {
    const res = await fetch("approve_order.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: `order_id=${encodeURIComponent(id)}&ref_num=${encodeURIComponent(refNum)}`
    });

    const data = await res.json();

    if (data.success) {
      closeModal('validate-modal');
      toast('Order moved to Processing');
      loadOrders();
    } else {
      toast(data.message || 'Approval failed', 'err');
    }
  } catch (error) {
    toast('Server error', 'err');
  }
}


async function rejectOrder(id) {
  try {
    const res = await fetch("reject_order.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: `order_id=${encodeURIComponent(id)}`
    });

    const data = await res.json();

    if (data.success) {
      closeModal('validate-modal');
      toast('Order rejected');
      loadOrders();
    } else {
      toast(data.message || 'Reject failed', 'err');
    }

  } catch (error) {
    console.error(error);
    toast('Server error', 'err');
  }
}

// ── UPDATE STATUS ─────────────────────────────────────────────────────────────
async function updateStatus(id, newStatus) {
  if (!confirm(`Move this order to "${newStatus}"?`)) {
    return;
  }

  try {
    const res = await fetch("update_order_status.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: `order_id=${encodeURIComponent(id)}&status=${encodeURIComponent(newStatus)}`
    });

    const data = await res.json();

    if (data.success) {
      toast(`Order moved to ${newStatus}`);
      loadOrders();
    } else {
      toast(data.message || 'Update failed', 'err');
    }
  } catch (error) {
    console.error(error);
    toast('Server error', 'err');
  }
}


function openUpdate(id) {
  const o = DB_ORDERS.find(x => x.id === id);
  if (!o) return;

  document.getElementById('um-body').innerHTML = `
    <p style="font-size:13px;color:var(--muted);margin-bottom:1rem">${o.id} · ${o.customer||'—'}</p>
    <div class="ff"><label>New Status</label>
      <select id="new-status">
        <option ${o.status==='Pending'?'selected':''}>Pending</option>
        <option ${o.status==='Processing'?'selected':''}>Processing</option>
        <option ${o.status==='Out for Delivery'?'selected':''}>Out for Delivery</option>
        <option ${o.status==='Delivered'?'selected':''}>Delivered</option>
      </select>
    </div>
    <button class="btn btn-green" style="width:100%;justify-content:center;margin-top:.5rem" onclick="updateStatus('${id}')">Update Status</button>`;
  openModal('update-modal');
}


loadOrders();
</script>
</body>
</html>
