<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FleurChase — My Orders</title>
<link rel="stylesheet" href="shared.css"/>
<style>
.order-card{background:white;border-radius:var(--rl);border:1px solid var(--line);padding:1.4rem;margin-bottom:12px;transition:box-shadow .2s}
.order-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07)}
.oc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.oc-num{font-size:14px;font-weight:700;color:var(--ink)}.oc-date{font-size:11px;color:var(--muted);margin-top:2px}
.st-pill{padding:4px 11px;border-radius:12px;font-size:11px;font-weight:700}
.stp-pend{background:#FFF3E0;color:#E65100}.stp-proc{background:#E3F2FD;color:#1565C0}
.stp-deliv{background:var(--g9);color:var(--g2)}.stp-done{background:var(--soft);color:var(--muted)}.stp-conf{background:#F3E5F5;color:#6A1B9A}
.track-line{display:flex;margin:1rem 0;position:relative}
.tstep{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
.tstep::before{content:'';position:absolute;top:11px;left:calc(-50%);right:calc(50%);height:2px;background:var(--line);z-index:0}
.tstep:first-child::before{display:none}.tstep.done::before,.tstep.cur::before{background:var(--g5)}
.tdot{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);background:white;z-index:1;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .3s}
.tdot.done{background:var(--g4);border-color:var(--g4);color:white}.tdot.cur{background:var(--p4);border-color:var(--p4);color:white}
.tlbl{font-size:10px;color:var(--muted);margin-top:5px;text-align:center}
.price-breakdown{display:flex;flex-direction:column;gap:3px;font-size:12px}
.pb-row{display:flex;justify-content:space-between;color:var(--muted)}
.pb-disc{color:var(--p3)}.pb-total{color:var(--ink);font-weight:700;font-size:13px;border-top:1px solid var(--line);padding-top:4px;margin-top:3px}
/* REVIEW */
.review-section{margin-top:1rem;border-top:1px solid var(--line);padding-top:1rem}
.review-section.done{background:var(--g9);border-radius:var(--r);padding:1rem;border:1px solid var(--g7);margin-top:.8rem}
.stars-row{display:flex;gap:4px;margin-bottom:.6rem}
.star-btn{font-size:22px;cursor:pointer;color:var(--line);transition:color .15s;background:none;border:none;padding:0;line-height:1}
.star-btn.lit{color:#F9A825}
.review-ta{width:100%;border:1.5px solid var(--line);border-radius:var(--r);padding:8px 10px;font-family:var(--font-b);font-size:12px;resize:none;height:65px;outline:none;transition:border-color .2s;background:var(--soft)}
.review-ta:focus{border-color:var(--g4);background:white}
</style>
</head>
<body>
<div id="top-nav" class="app-nav"></div>

<div class="main-area no-sidebar">
<div class="p-page">
  <div class="page-title">My <span style="color:var(--p3);font-style:italic">Orders</span></div>
  <div class="page-sub">Track your FleurChase pre-orders and leave reviews</div>
  <div style="display:flex;background:var(--soft);border-radius:var(--r);padding:3px;gap:3px;width:fit-content;margin-bottom:1.5rem">
    <button id="tab-active"  class="btn btn-sm" style="background:white;color:var(--g2);box-shadow:0 1px 5px rgba(0,0,0,.08);border:none;border-radius:8px;padding:7px 18px;font-family:var(--font-b);font-size:13px;font-weight:500;cursor:pointer" onclick="setTab('active',this)">Active Orders</button>
    <button id="tab-history" class="btn btn-sm" style="background:none;color:var(--muted);border:none;border-radius:8px;padding:7px 18px;font-family:var(--font-b);font-size:13px;font-weight:500;cursor:pointer" onclick="setTab('history',this)">Order History</button>
  </div>
  <div id="active-list"></div>
  <div id="history-list" style="display:none"></div>
</div>
<div id="footer-container"></div>
</div>

<!-- REVIEW MODAL -->
<div class="modal-overlay" id="review-modal">
  <div class="modal-box" style="max-width:440px">
    <div class="modal-head"><h3>Leave a Review</h3><button class="modal-close" onclick="closeModal('review-modal')">✕</button></div>
    <div id="review-modal-body"></div>
  </div>
</div>

<div id="fc-toast" class="toast"></div>
<script src="data.js"></script><script src="nav.js"></script>
<script>
requireAuth('customer');
buildTopNav('orders');
renderFooter('footer-container', false);

const STEPS=['Confirmed','Processing','Out for Delivery','Delivered'];
const SC={Confirmed:'stp-conf',Processing:'stp-proc','Out for Delivery':'stp-deliv',Delivered:'stp-done',Pending:'stp-pend'};
let reviews=JSON.parse(localStorage.getItem('fc_reviews')||'{}');

function getStep(status){const i=STEPS.indexOf(status);return i===-1?0:i;}

function renderOrderCard(o){
  const step=getStep(o.status);
  const isFree=o.shippingFee===0;
  const rev=reviews[o.id];
  const deliveredActions=o.status==='Delivered'?`
    <div style="display:flex;gap:8px;margin-top:.5rem;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="toast('Reorder initiated!');setTimeout(()=>location.href='shop.html',1200)">↻ Reorder</button>
      ${rev?`<div class="review-section done">
        <div style="font-size:12px;font-weight:600;color:var(--g2);margin-bottom:3px">Your Review</div>
        <div style="color:#F9A825;font-size:14px">${'★'.repeat(rev.rating)}${'☆'.repeat(5-rev.rating)}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px;font-style:italic">"${rev.text}"</div>
      </div>`:`<button class="btn btn-green btn-sm" onclick="openReview('${o.id}')">⭐ Leave a Review</button>`}
    </div>`:'';
  return `
    <div class="order-card">
      <div class="oc-head">
        <div><div class="oc-num">${o.id}</div>
          <div class="oc-date">Placed ${o.placedAt?new Date(o.placedAt).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'}):'Recently'} · Delivery ${o.delivDate}${o.delivTime?' · '+o.delivTime:''}</div>
        </div>
        <span class="st-pill ${SC[o.status]||'stp-pend'}">${o.status}</span>
      </div>
      <div style="display:flex;gap:12px;margin-bottom:1rem;align-items:flex-start;flex-wrap:wrap">
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px">${o.items}</div>
          ${o.addonDetails?.length?`<div style="font-size:12px;color:var(--muted);margin-bottom:3px">Extras: ${o.addonDetails.map(a=>a.name).join(', ')}</div>`:''}
          ${o.promo?`<span class="tag tag-p" style="font-size:10px">🏷️ ${o.promo}</span> `:'' }
          <div style="font-size:12px;color:var(--g3);font-weight:500;margin-top:3px">${o.payMethod||''}</div>
          <div style="font-size:12px;color:var(--muted)">📍 ${o.loc||o.address||'—'} · ${isFree?'🟢 Free delivery':'🟡 Extra shipping fee'}</div>
        </div>
        <div class="price-breakdown">
          <div class="pb-row"><span>Items</span><span>${fmtP(o.sub||o.total)}</span></div>
          ${o.addonTotal?`<div class="pb-row"><span>Extras</span><span>${fmtP(o.addonTotal)}</span></div>`:''}
          ${o.discount?`<div class="pb-row pb-disc"><span>Discount</span><span>−${fmtP(o.discount)}</span></div>`:''}
          ${o.shippingFee?`<div class="pb-row"><span>Shipping</span><span>${fmtP(o.shippingFee)}</span></div>`:`<div class="pb-row"><span>Shipping</span><span style="color:var(--g3)">FREE</span></div>`}
          <div class="pb-row pb-total"><span>Total</span><span>${fmtP(o.total)}</span></div>
        </div>
      </div>
      <div class="track-line">
        ${STEPS.map((s,si)=>`
          <div class="tstep ${si<step?'done':''} ${si===step?'cur':''}">
            <div class="tdot ${si<step?'done':''} ${si===step?'cur':''}">${si<step?'✓':si===step?'●':''}</div>
            <div class="tlbl">${s}</div>
          </div>`).join('')}
      </div>
      ${o.status!=='Delivered'?`<div class="alert alert-g" style="margin-top:.5rem">⏰ Scheduled for <strong>${o.delivDate}${o.delivTime?' · '+o.delivTime:''}</strong></div>`:''}
      ${o.payStatus==='uploaded'&&o.status==='Pending'?`<div class="alert alert-b" style="margin-top:.5rem">⏳ Receipt uploaded. Awaiting payment verification.</div>`:''}
      ${o.payStatus==='verified'?`<div class="alert alert-g" style="margin-top:.5rem">✅ Payment verified! Your order is being processed.</div>`:''}
      ${deliveredActions}
    </div>`;
}

function renderLists(){
  const all=FC.getOrders();
  const active=all.filter(o=>o.status!=='Delivered');
  const history=all.filter(o=>o.status==='Delivered');
  document.getElementById('active-list').innerHTML=active.length?active.map(renderOrderCard).join('')
    :`<div class="empty-state"><div class="ei">📭</div><h3>No active orders</h3><p>Your active pre-orders will appear here.</p><a class="btn btn-green" href="shop.html" style="margin-top:1rem;text-decoration:none">Shop Now →</a></div>`;
  document.getElementById('history-list').innerHTML=history.length?history.map(renderOrderCard).join('')
    :`<div class="empty-state"><div class="ei">📋</div><h3>No order history</h3><p>Completed orders will appear here.</p></div>`;
}

function setTab(t,btn){
  document.getElementById('active-list').style.display=t==='active'?'block':'none';
  document.getElementById('history-list').style.display=t==='history'?'block':'none';
  ['active','history'].forEach(n=>{
    const b=document.getElementById('tab-'+n);
    if(b){b.style.background=n===t?'white':'none';b.style.color=n===t?'var(--g2)':'var(--muted)';b.style.boxShadow=n===t?'0 1px 5px rgba(0,0,0,.08)':'none';}
  });
}

// REVIEW SYSTEM
let reviewOrderId=null, reviewRating=0;

function openReview(orderId){
  reviewOrderId=orderId; reviewRating=0;
  const o=FC.getOrders().find(x=>x.id===orderId);
  document.getElementById('review-modal-body').innerHTML=`
    <div style="font-size:13px;color:var(--muted);margin-bottom:1rem">
      <strong style="color:var(--ink)">${o?.items||'Your order'}</strong><br>
      Share your experience to help others!
    </div>
    <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:.5rem">Your Rating</div>
    <div class="stars-row" id="stars-row">
      ${[1,2,3,4,5].map(i=>`<button class="star-btn" id="star-${i}" onclick="setRating(${i})">★</button>`).join('')}
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:.8rem" id="rating-lbl">Tap a star to rate</div>
    <div class="ff"><label>Your Review</label>
      <textarea class="review-ta" id="review-text" placeholder="Tell us about your experience — the flowers, packaging, delivery..."></textarea>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:.8rem">Your review helps future customers and our florists!</div>
    <button class="btn btn-green" style="width:100%;justify-content:center" onclick="submitReview()">Submit Review ⭐</button>`;
  openModal('review-modal');
}

function setRating(n){
  reviewRating=n;
  const labels=['','Poor 😕','Fair 😐','Good 😊','Great 😄','Excellent! 🌟'];
  document.getElementById('rating-lbl').textContent=labels[n]||'';
  [1,2,3,4,5].forEach(i=>document.getElementById('star-'+i)?.classList.toggle('lit',i<=n));
}

function submitReview(){
  if(!reviewRating){toast('Please select a star rating.','warn');return;}
  const text=document.getElementById('review-text').value.trim();
  if(!text){toast('Please write a short review.','warn');return;}
  reviews[reviewOrderId]={rating:reviewRating,text,date:new Date().toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'})};
  localStorage.setItem('fc_reviews',JSON.stringify(reviews));
  closeModal('review-modal');
  toast('⭐ Review submitted! Thank you!');
  renderLists();
}

renderLists();
</script>
</body>
</html>
