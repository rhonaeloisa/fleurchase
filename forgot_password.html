<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Reset Password | FleurChase</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        .auth-center { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background-image: url("images/background.png"); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
        }
        .auth-box { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 400px; 
            border: 1px solid #eee; 
            box-shadow: 0 20px 60px rgba(0,0,0,.1); 
        }
        .reset-input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 1rem; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px;
        }
        .auth-title { 
            font-family: sans-serif; 
            font-size: 24px; 
            font-weight: 700; 
            color: #333; 
            text-align: center; 
            margin-bottom: 1.8rem; 
        }
        
        /* PERFECTED GRADIENT BUTTON */
        .btn-green, .btn-pink { 
            background: linear-gradient(to right, #4c9153 0%, #2f5d34 100%);
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 16px;
            box-shadow: 0 6px 15px rgba(47, 93, 52, 0.25); 
            transition: all 0.3s ease;
        }
        
        .btn-green:hover, .btn-pink:hover {
            background: linear-gradient(to right, #3f7d45 0%, #244929 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(47, 93, 52, 0.35);
        }

        .hidden { display: none !important; }
        .back-link { text-align: center; margin-top: 1.5rem; font-size: 13px; font-family: sans-serif;}
        
        /* INALIS ANG BOLD DITO */
        .back-link a { color: #2f5d34; font-weight: normal; text-decoration: none; cursor: pointer; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-center">
        <div class="auth-box">
            <h2 class="auth-title">Reset Password</h2>
            
            <div id="step-1">
                <input id="reset-email" type="email" placeholder="Enter your email address" class="reset-input">
                <button class="btn-green" style="width:100%; padding:14px" onclick="sendOTP()">Send OTP</button>
                <div class="back-link"><a href="login.html">Back to Sign In</a></div>
            </div>

            <div id="step-2" class="hidden">
                <input id="input-otp" type="text" placeholder="Enter the OTP from the alert box" class="reset-input">
                <input id="new-pass" type="password" placeholder="Enter New Password" class="reset-input">
                <button class="btn-pink" style="width:100%; padding:14px" onclick="verifyAndReset()">Verify & Reset</button>
                <div class="back-link"><a onclick="location.reload()">Start Over</a></div>
            </div>
        </div>
    </div>

    <script>
        let tempOtp = "";
        
        async function sendOTP() {
            const email = document.getElementById('reset-email').value.trim();
            if(!email) { alert("Please enter your email."); return; }
            
            const formData = new FormData();
            formData.append('email', email);
            
            try {
                const res = await fetch('simulate_otp.php', { method: 'POST', body: formData });
                const data = await res.json();
                
                if(data.success) {
                    tempOtp = data.otp;
                    alert("Copy the simulated OTP: " + tempOtp); 
                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-2').classList.remove('hidden');
                } else { 
                    alert(data.message); 
                }
            } catch (error) {
                alert("Cannot connect to server. Check if simulate_otp.php is running.");
            }
        }

        async function verifyAndReset() {
            const otp = document.getElementById('input-otp').value.trim();
            const email = document.getElementById('reset-email').value.trim();
            const newPass = document.getElementById('new-pass').value;

            if(!otp || !newPass) { alert("Please fill in all fields."); return; }

            if(otp == tempOtp) {
                const formData = new FormData();
                formData.append('email', email);
                formData.append('new_password', newPass);
                
                try {
                    const res = await fetch('reset_password.php', { method: 'POST', body: formData });
                    const data = await res.json();
                    
                    alert(data.message);
                    if(data.success) window.location.href = 'login.html';
                } catch (error) {
                    alert("Cannot connect to server. Check if reset_password.php is running.");
                }
            } else { 
                alert("Wrong OTP! Try again."); 
            }
        }
    </script>
</body>
</html>
