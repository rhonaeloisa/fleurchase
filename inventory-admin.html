<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FleurChase — Inventory</title>
<link rel="stylesheet" href="shared.css"/>
<style>
  /* --- Freshness Progress Bars --- */
  .fresh-bar {
    height: 6px;
    border-radius: 3px;
    background: var(--line);
    overflow: hidden;
    width: 80px;
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
  }

  .fresh-fill {
    height: 100%;
    border-radius: 3px;
  }

  .fresh-ok  { background: var(--g4); }
  .fresh-mid { background: #FFA000; }
  .fresh-low { background: var(--p4); }

  /* --- Inventory Alerts --- */
  .alert {
    border-radius: var(--r);
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.6;
    margin-bottom: 6px;
    border-left: 3px solid;
  }

  .alert-r { background: var(--p9); border-color: var(--p3); } /* Critical */
  .alert-a { background: #FFF8E1; border-color: #FFA000; }     /* Warning */
  .alert-g { background: var(--g9); border-color: var(--g4); } /* Good */

  /* --- Dashboard Metrics (Top Cards) --- */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .metric-card {
    background: white;
    border-radius: var(--rl);
    border: 1px solid var(--line);
    padding: 1.2rem;
  }

  .metric-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--muted);
    margin-bottom: .5rem;
  }

  .metric-val {
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    font-family: var(--font-d);
  }

  .metric-sub {
    font-size: 11px;
    margin-top: 4px;
  }

  .metric-up { color: var(--g3); }
  .metric-dn { color: var(--p3); }
  .metric-n  { color: var(--muted); }

  /* --- Bottom Layout & Restock List --- */
  .inv-two {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-top: 1.5rem;
  }

  .restock-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
  }

  .restock-item:last-child {
    border-bottom: none;
  }

  /* --- Inventory Images --- */
.inv-img-thumb {
    width: 36px;
    height: 36px;
    background: var(--g9); 
    border-radius: var(--r);
    border: 1px solid var(--line);
    object-fit: contain; 
    padding: 2px; 
  }

.inv-img-large {
  width: 60px; 
    height: 60px;
    background: var(--g9);
    border-radius: var(--r);
    border: 1px solid var(--line);
    object-fit: contain;
    padding: 4px;
}

/* --- Updated Drag & Drop UI --- */
.dropzone {
  border: 2px dashed var(--line);
  border-radius: var(--rl);
  padding: 1.5rem;
  text-align: center;
  background: var(--soft);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  min-height: 160px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

/* Green border when a photo is uploaded or dragging over */
.dropzone.has-photo, .dropzone.dragover {
  border-color: var(--g4);
  background: var(--g9);
}

.dz-preview-img {
  width: 110px;
  height: 110px;
  object-fit: contain;
  border-radius: 12px;
  background: white;
  border: 1px solid var(--line);
}

.dz-status-text {
  font-size: 13px;
  font-weight: 600;
  color: var(--g2);
}

.dz-remove-link {
  display: block;
  margin-top: 8px;
  font-size: 12px;
  color: var(--p3);
  text-decoration: underline;
  cursor: pointer;
  border: none;
  background: none;
}

.dropzone input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}
</style>
</head>
<body>
<div id="top-nav" class="app-nav"></div>
<aside class="sidebar" id="fc-sidebar"></aside>
<div class="main-area">
<div class="p-page">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem">
    <div><div class="page-title">Inventory</div><div class="page-sub" style="margin-bottom:0">Track flower stock, freshness, and base price per stem</div></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="refreshFreshness()">↻ Refresh</button>
      <button class="btn btn-green btn-sm" onclick="openAddModal()">+ Add Stock</button>
    </div>
  </div>

  <!-- METRICS -->
  <div class="metrics-grid" id="inv-metrics"></div>

  <!-- MAIN TABLE -->
  <div class="table-wrap">
    <div class="table-head">
      <h3>Flower Inventory</h3>
      <span style="font-size:12px;color:var(--muted)">Freshness auto-calculated from arrival date</span>
    </div>
    <div style="overflow-x:auto">
      <table class="data-table" id="inv-table">
        <thead>
          <tr>
            <th>Flower</th>
            <th>Stock</th>
            <th>Base Price / Stem</th>
            <th>Arrived</th>
            <th>Shelf Life</th>
            <th>Best Before</th>
            <th>Freshness</th>
            <th>%</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="inv-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- BOTTOM CARDS -->
  <div class="inv-two">
    <div class="table-wrap" style="margin-bottom:0">
      <div class="table-head"><h3>⚠ Freshness Alerts</h3></div>
      <div style="padding:1rem" id="freshness-alerts"></div>
    </div>
    <div class="table-wrap" style="margin-bottom:0">
      <div class="table-head"><h3>Restock Recommendations</h3></div>
      <div style="padding:1rem" id="restock-list"></div>
    </div>
  </div>
</div>
</div>

<!-- ADD STOCK MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal-box" style="max-width:520px">
    <div class="modal-head"><h3 id="add-modal-title">Add Stock Entry</h3><button class="modal-close" onclick="closeModal('add-modal')">✕</button></div>
    <div id="add-modal-body"></div>
  </div>
</div>

<!-- MARK SALE MODAL -->
<div class="modal-overlay" id="sale-modal">
  <div class="modal-box" style="max-width:380px">
    <div class="modal-head"><h3>Mark as On Sale</h3><button class="modal-close" onclick="closeModal('sale-modal')">✕</button></div>
    <div id="sale-modal-body"></div>
  </div>
</div>

<div id="fc-toast" class="toast"></div>
<script src="data.js"></script><script src="nav.js"></script>
<script>
requireAuth('admin');
buildTopNav('inventory-admin');
buildAdminSidebar('inventory-admin.html');

let editingInvId = null;

function getInventory() { return FC.getInventory(); }

function calcFreshness(item) {
  const arrived = new Date(item.arrived + ' 2024');
  const now = new Date('2024-03-19');
  const daysPassed = Math.floor((now - arrived) / 86400000);
  const remaining = Math.max(0, item.lifeDays - daysPassed);
  return Math.round((remaining / item.lifeDays) * 100);
}

function bestBefore(item) {
  const arrived = new Date(item.arrived + ' 2024');
  arrived.setDate(arrived.getDate() + item.lifeDays);
  return arrived.toLocaleDateString('en-PH', { month: 'short', day: 'numeric' });
}

function freshTag(pct) {
  if (pct > 60) return '<span class="tag tag-g">Fresh</span>';
  if (pct > 25) return '<span class="tag tag-a">Use Soon</span>';
  if (pct > 10) return '<span class="tag tag-p">On Sale</span>';
  return '<span class="tag tag-p">⚠ Expiring</span>';
}

function renderMetrics() {
  const inv = getInventory();
  const total = inv.reduce((s,i) => s+i.stock, 0);
  const fresh = inv.filter(i => i.freshness > 60).length;
  const critical = inv.filter(i => i.freshness <= 25).length;
  const lowStock = inv.filter(i => i.stock < 30).length;
  document.getElementById('inv-metrics').innerHTML = `
    <div class="metric-card"><div class="metric-label">Total Stems</div><div class="metric-val">${total.toLocaleString()}</div><div class="metric-sub metric-n">${inv.length} flower types</div></div>
    <div class="metric-card"><div class="metric-label">Fresh Items</div><div class="metric-val" style="color:var(--g3)">${fresh}</div><div class="metric-sub metric-up">↑ Good quality</div></div>
    <div class="metric-card"><div class="metric-label">Critical Freshness</div><div class="metric-val" style="color:var(--p3)">${critical}</div><div class="metric-sub metric-dn">Need attention</div></div>
    <div class="metric-card"><div class="metric-label">Low Stock</div><div class="metric-val" style="color:#E65100">${lowStock}</div><div class="metric-sub metric-n"><30 stems</div></div>
  `;
}

function renderTable() {
  const inv = getInventory();
  const tbody = document.getElementById('inv-tbody');
  if (!tbody) return;

  tbody.innerHTML = inv.map(item => {
    const pct = item.freshness;
    const fillCls = pct > 60 ? 'fresh-ok' : pct > 25 ? 'fresh-mid' : 'fresh-low';
    const imgSrc = (item.img && item.img.startsWith('data:')) ? item.img : `images/${item.img || 'default-flower.jpg'}`;

    return `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:12px">
          <img src="${imgSrc}" class="inv-img-thumb" onerror="this.src='images/default.jpg'">
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--ink)">${item.name}</div>
            <div style="font-size:11px;color:var(--muted)">ID: ${item.id}</div>
          </div>
        </div>
      </td>
      <td style="font-weight:700;font-size:15px;color:${item.stock < 30 ? 'var(--p3)' : 'var(--ink)'}">
        ${item.stock}
        ${item.stock < 30 ? '<span style="font-size:10px;color:var(--p3);display:block;font-weight:500">⚠ Low</span>' : ''}
      </td>
      <td style="font-weight:600;color:var(--g3)">${fmtP(item.pricePerStem || 0)}</td>
      <td style="font-size:13px">${item.arrived}</td>
      <td style="font-size:13px">${item.lifeDays} days</td>
      <td style="font-size:13px">${bestBefore(item)}</td>
      <td>
        <div class="fresh-bar"><div class="fresh-fill ${fillCls}" style="width:${pct}%"></div></div>
      </td>
      <td style="font-weight:700;color:${pct > 60 ? 'var(--g3)' : pct > 25 ? '#FFA000' : 'var(--p3)'}">${pct}%</td>
      <td>${freshTag(pct)}</td>
      <td>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" onclick="openEditModal('${item.id}')">Edit</button>
          <button class="btn ${item.onSale ? 'btn-green' : 'btn-danger'} btn-sm" onclick="openSaleModal('${item.id}')">
            ${item.onSale ? `🏷️ ${fmtP(item.salePrice)}` : 'Mark Sale'}
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');

  renderAlerts(inv);
  renderRestock(inv);
  renderMetrics();
}

function renderAlerts(inv) {
  const el = document.getElementById('freshness-alerts');
  const alerts = inv.filter(i => i.freshness <= 40).sort((a,b) => a.freshness - b.freshness);
  if (!alerts.length) {
    el.innerHTML = '<div class="alert alert-g">✅ All inventory is in good condition!</div>';
    return;
  }
  el.innerHTML = alerts.map(i => {
    const imgSrc = (i.img && i.img.startsWith('data:')) ? i.img : `images/${i.img || 'default.jpg'}`;
    return `
    <div class="alert ${i.freshness <= 15 ? 'alert-r' : 'alert-a'}">
      <img src="${imgSrc}" style="width:20px;height:20px;object-fit:contain;vertical-align:middle;margin-right:8px;border-radius:4px;background:white">
      <strong>${i.name}</strong> — ${i.freshness}% freshness
    </div>`;
  }).join('');
}

function renderRestock(inv) {
  const el = document.getElementById('restock-list');
  const low = inv.filter(i => i.stock < 50 || i.freshness < 30);
  if (!low.length) {
    el.innerHTML = '<p style="font-size:13px;color:var(--muted)">All items are well-stocked!</p>';
    return;
  }
  el.innerHTML = low.map(i => {
    const imgSrc = (i.img && i.img.startsWith('data:')) ? i.img : `images/${i.img || 'default.jpg'}`;
    return `
    <div class="restock-item">
      <div style="display:flex;align-items:center;gap:10px">
        <img src="${imgSrc}" style="width:30px;height:30px;object-fit:contain;border-radius:4px;background:var(--soft)">
        <div><strong>${i.name}</strong><div style="font-size:11px;color:var(--muted)">${i.stock} stems</div></div>
      </div>
      <span class="tag ${i.stock < 30 ? 'tag-p' : 'tag-a'}">${i.stock < 30 ? 'Urgent' : 'Soon'}</span>
    </div>`;
  }).join('');
}

function getModalBody(item) {
  const p = item || {};
  const hasImg = !!p.img;
  return `
    <div class="ff" style="margin-bottom: 1rem;"><label>FLOWER NAME *</label><input id="inv-name" value="${p.name||''}" placeholder="e.g. Red Roses"/></div>
    
    <div class="ff" style="margin-bottom: 1rem;">
      <label>STEM TYPE *</label>
      <select id="inv-type" style="width:100%; padding:10px; border:1.5px solid var(--line); border-radius:var(--r); background:var(--soft); outline:none; font-family:inherit;">
        <option value="flower" ${p.type === 'flower' ? 'selected' : ''}>Main Flower</option>
        <option value="filler" ${p.type === 'filler' ? 'selected' : ''}>Filler</option>
      </select>
    </div>

    <div class="ff" style="margin-bottom: 1.5rem;"><label>FLOWER IMAGE *</label>
      <div class="dropzone ${hasImg ? 'has-photo' : ''}" id="dropzone">
        <img src="${p.img || ''}" class="dz-preview-img" id="dz-preview" style="${hasImg ? 'display:block' : 'display:none'}">
        <div id="dz-upload-prompt" style="${hasImg ? 'display:none' : 'display:block'}">
          <div style="font-size: 24px; margin-bottom: 8px;">👤</div>
          <div style="font-weight:700; font-size:14px; color:var(--ink)">Upload Photo</div>
          <div style="font-size:11px; color:var(--muted)">JPG, PNG — max 2MB · Click or drag</div>
        </div>
        <div id="dz-ready-prompt" style="${hasImg ? 'display:block' : 'display:none'}"><div class="dz-status-text">Photo ready — click to change</div></div>
        <input type="file" id="inv-file" accept="image/*" onchange="handleFileSelect(event)">
        <input type="hidden" id="inv-img-data" value="${p.img || ''}">
      </div>
      <button type="button" class="dz-remove-link" id="dz-remove" style="${hasImg ? 'display:block' : 'display:none'}" onclick="removePhoto()">Remove photo</button>
    </div>
    <div class="fg2">
      <div class="ff"><label>STOCK (STEMS) *</label><input id="inv-stock" type="number" value="${p.stock||''}" placeholder="200" min="0"/></div>
      <div class="ff"><label>BASE PRICE PER STEM (₱) *</label><input id="inv-price" type="number" value="${p.pricePerStem||''}" placeholder="45" min="1"/></div>
    </div>
    <div class="fg2">
      <div class="ff"><label>DATE ARRIVED *</label><input id="inv-arrived" value="${p.arrived||'Mar 15'}" placeholder="Mar 15"/></div>
      <div class="ff"><label>SHELF LIFE (DAYS) *</label><input id="inv-life" type="number" value="${p.lifeDays||7}" placeholder="7" min="1"/></div>
    </div>
    <div class="ff"><label>LINKED FLOWER PRODUCT ID (OPTIONAL)</label><input id="inv-flower-id" value="${p.flowerId||''}" placeholder="f1"/></div>
    <button class="btn btn-green" style="width:100%; justify-content:center; margin-top:1.5rem; padding: 14px;" onclick="saveInventory()">✓ Save Changes</button>`;
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { toast('Image is too large (max 2MB)', 'err'); return; }
  const reader = new FileReader();
  reader.onload = function(event) {
    const dataUrl = event.target.result;
    document.getElementById('inv-img-data').value = dataUrl;
    document.getElementById('dz-preview').src = dataUrl;
    document.getElementById('dz-preview').style.display = 'block';
    document.getElementById('dz-upload-prompt').style.display = 'none';
    document.getElementById('dz-ready-prompt').style.display = 'block';
    document.getElementById('dz-remove').style.display = 'block';
    document.getElementById('dropzone').classList.add('has-photo');
  };
  reader.readAsDataURL(file);
}

function removePhoto() {
  document.getElementById('inv-img-data').value = "";
  document.getElementById('inv-file').value = "";
  document.getElementById('dz-preview').src = "";
  document.getElementById('dz-preview').style.display = 'none';
  document.getElementById('dz-upload-prompt').style.display = 'block';
  document.getElementById('dz-ready-prompt').style.display = 'none';
  document.getElementById('dz-remove').style.display = 'none';
  document.getElementById('dropzone').classList.remove('has-photo');
}

function saveInventory() {
  const name = document.getElementById('inv-name').value.trim();
  const type = document.getElementById('inv-type').value; // Gets "flower" or "filler"
  const imgData = document.getElementById('inv-img-data').value;
  const stock = parseInt(document.getElementById('inv-stock').value);
  const pricePerStem = parseFloat(document.getElementById('inv-price').value);
  const arrived = document.getElementById('inv-arrived').value.trim();
  const lifeDays = parseInt(document.getElementById('inv-life').value);
  const flowerId = document.getElementById('inv-flower-id').value.trim();

  if (!name || !imgData || isNaN(stock) || isNaN(pricePerStem) || !arrived || isNaN(lifeDays)) {
    toast('Please fill in all fields and upload an image.', 'err'); 
    return;
  }

  const inv = getInventory();
  if (editingInvId) {
    const idx = inv.findIndex(i => i.id === editingInvId);
    if (idx !== -1) {
      // Added "type" here for updates
      inv[idx] = { ...inv[idx], name, type, img: imgData, stock, pricePerStem, arrived, lifeDays, flowerId };
    }
  } else {
    // Added "type" here for new entries
    inv.push({ id: 'i' + Date.now(), flowerId, type, name, img: imgData, stock, pricePerStem, arrived, lifeDays, freshness: 100 });
  }

  FC.saveInventory(inv);
  closeModal('add-modal');
  renderTable();
  toast('✓ Inventory saved');
}

function openAddModal() {
  editingInvId = null;
  document.getElementById('add-modal-title').textContent = 'Add Stock Entry';
  document.getElementById('add-modal-body').innerHTML = getModalBody(null);
  openModal('add-modal');
}

function openEditModal(id) {
  const item = getInventory().find(i => i.id === id);
  if (!item) return;
  editingInvId = id;
  document.getElementById('add-modal-title').textContent = 'Edit: ' + item.name;
  document.getElementById('add-modal-body').innerHTML = getModalBody(item);
  openModal('add-modal');
}

function openSaleModal(id) {
  const item = getInventory().find(i => i.id === id);
  if (!item) return;
  const suggested = Math.max(10, Math.round(item.pricePerStem * (item.freshness / 100)));
  const isOnSale = item.onSale;
  const imgSrc = (item.img && item.img.startsWith('data:')) ? item.img : `images/${item.img || 'default.jpg'}`;

  document.getElementById('sale-modal-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--line)">
      <img src="${imgSrc}" class="inv-img-large" onerror="this.src='images/default.jpg'">
      <div>
        <div style="font-size:15px;font-weight:700;color:var(--g1)">${item.name}</div>
        <div style="font-size:12px;color:var(--muted)">Current: <strong style="color:var(--g3)">${fmtP(item.pricePerStem)}</strong> · Fresh: <strong>${item.freshness}%</strong></div>
      </div>
    </div>
    <div class="fg2">
      <div class="ff"><label>Original (₱)</label><input type="number" id="sale-orig" value="${item.pricePerStem}" readonly style="background:var(--soft)"/></div>
      <div class="ff"><label>Sale Price (₱) *</label><input type="number" id="sale-price" value="${isOnSale ? item.salePrice : suggested}" oninput="updateSalePreview(${item.pricePerStem})"/></div>
    </div>
    <div id="sale-preview" style="background:var(--p9);border:1px solid var(--p6);border-radius:var(--r);padding:10px;font-size:12px;color:var(--p2);margin-bottom:1rem"></div>
    <div class="ff"><label>Reason</label>
      <select id="sale-reason">
        <option value="Markdown">Markdown</option>
        <option value="Clearance">Clearance</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;margin-top:1rem">
      <button class="btn btn-pink" style="flex:1" onclick="confirmSale('${id}')">Apply</button>
      <button class="btn btn-ghost" onclick="closeModal('sale-modal')">Cancel</button>
    </div>`;
  openModal('sale-modal');
  updateSalePreview(item.pricePerStem);
}

function updateSalePreview(original) {
  const salePrice = parseFloat(document.getElementById('sale-price')?.value) || 0;
  const el = document.getElementById('sale-preview');
  if (!el || salePrice >= original) return;
  const pct = Math.round(((original - salePrice) / original) * 100);
  el.innerHTML = `🏷️ <strong>${pct}% off</strong> — New price: <strong>${fmtP(salePrice)}</strong>`;
}

function confirmSale(id) {
  const inv = getInventory();
  const item = inv.find(i => i.id === id);
  const salePrice = parseFloat(document.getElementById('sale-price').value);
  if (salePrice >= item.pricePerStem) { toast('Invalid price', 'err'); return; }
  item.onSale = true; item.salePrice = salePrice;
  FC.saveInventory(inv);
  closeModal('sale-modal');
  renderTable();
}

renderTable();
</script>
</body>
</html>
